<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>마을 공지사항 - 노형 빌리지</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --scroll-gold: #d4af37;
      --scroll-gold-dark: #aa7c11;
      --scroll-bg: #110d05;
      --scroll-paper: #fcf8ee;
      --scroll-border: rgba(170, 124, 17, 0.25);
      --text-gold: #f7e7c4;
      --text-wood: #2c1a04;
    }

    body {
      font-family: 'Outfit', 'Noto Sans KR', sans-serif;
      background-color: var(--scroll-bg) !important;
      background-image: 
        radial-gradient(circle at 50% 0%, rgba(212, 175, 55, 0.15) 0%, transparent 60%),
        url('https://www.transparenttextures.com/patterns/dark-matter.png');
      color: var(--text-gold);
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 30px 15px 120px 15px;
      position: relative;
    }

    /* 🚪 우측 상단 닫기 듀얼 버튼 */
    .top-close-btn {
      position: absolute;
      top: 30px;
      right: 15px;
      width: 40px;
      height: 40px;
      background: rgba(212, 175, 55, 0.15);
      border: 2px solid var(--scroll-gold);
      border-radius: 50%;
      color: var(--scroll-gold);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.1rem;
      transition: all 0.3s;
      z-index: 100;
    }
    .top-close-btn:hover {
      background: var(--scroll-gold);
      color: var(--scroll-bg);
      transform: rotate(90deg);
    }

    header {
      text-align: center;
      margin-bottom: 40px;
      padding-top: 10px;
    }
    header h1 {
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--scroll-gold);
      margin-bottom: 8px;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    header p {
      color: #9c8e7a;
      font-weight: 700;
      font-size: 0.8rem;
      margin: 0;
      text-transform: uppercase;
    }

    /* 📜 황금 두루마리 (Golden Scroll) 메타포 */
    .scroll-card {
      background: var(--scroll-paper);
      border: 3px solid var(--scroll-gold-dark);
      border-radius: 25px;
      padding: 25px;
      margin-bottom: 25px;
      box-shadow: 0 15px 35px rgba(212, 175, 55, 0.12);
      position: relative;
      overflow: hidden;
      color: var(--text-wood);
      background-image: url('https://www.transparenttextures.com/patterns/lined-paper-2.png');
    }

    /* 두루마리 원통 효과 상하 장식 */
    .scroll-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 8px;
      background: linear-gradient(to right, var(--scroll-gold-dark), var(--scroll-gold), var(--scroll-gold-dark));
    }
    .scroll-card::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 8px;
      background: linear-gradient(to right, var(--scroll-gold-dark), var(--scroll-gold), var(--scroll-gold-dark));
    }

    .scroll-handle-left {
      position: absolute;
      left: 10px;
      top: 0;
      bottom: 0;
      width: 4px;
      background: linear-gradient(to bottom, var(--scroll-gold-dark), var(--scroll-gold), var(--scroll-gold-dark));
      opacity: 0.5;
    }

    .category {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.68rem;
      font-weight: 900;
      background: rgba(170, 124, 17, 0.15);
      color: var(--scroll-gold-dark);
      margin-bottom: 12px;
      border: 1px solid var(--scroll-border);
      text-transform: uppercase;
    }

    .title {
      font-size: 1.05rem;
      font-weight: 900;
      color: var(--text-wood);
      margin-bottom: 15px;
      line-height: 1.4;
      border-bottom: 1.5px dashed rgba(170, 124, 17, 0.2);
      padding-bottom: 10px;
    }

    .content {
      font-size: 0.85rem;
      font-weight: 700;
      color: #3e2d1d;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: keep-all;
    }

    .date {
      font-size: 0.72rem;
      color: #7a6853;
      margin-top: 20px;
      text-align: right;
      font-weight: 800;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 6px;
    }

    /* 🚪 초대형 마을 광장으로 돌아가기 버튼 */
    .huge-return-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--scroll-gold) 0%, var(--scroll-gold-dark) 100%);
      color: var(--scroll-bg);
      border: none;
      padding: 20px;
      border-radius: 25px;
      font-size: 1.05rem;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(212, 175, 55, 0.25);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 40px;
      text-decoration: none;
    }
    .huge-return-btn:active {
      transform: scale(0.97);
    }
  </style>
</head>
<body>

  <!-- [v44.218] 로딩 오버레이 -->
  <div id="v-loading" class="v-loading-overlay" style="display: flex;">
      <div class="v-loading-spinner"></div>
      <div id="v-loading-msg" style="font-weight: 800; color: var(--scroll-gold); font-size: 0.9rem;">마을의 중대사 문서를 펼치고 있습니다...</div>
  </div>

  <div class="container">
    
    <!-- 🚪 우측 상단 닫기 버튼 -->
    <div class="top-close-btn" onclick="location.href='index.html'" title="마을 광장으로 돌아가기">
      <i class="fa-solid fa-xmark"></i>
    </div>

    <header>
      <h1><i class="fa-solid fa-scroll"></i> VILLAGE SCROLLS</h1>
      <p>마을 중대사 및 이장님 선포 문서</p>
    </header>

    <!-- 📜 공지 목록 -->
    <div id="noticeList">
      <!-- Dynamic list loaded from sheet -->
    </div>

    <!-- 🚪 초대형 하단 돌아가기 버튼 -->
    <a href="index.html" class="huge-return-btn">
      <i class="fa-solid fa-door-open" style="font-size: 1.3rem;"></i> 🚪 마을 광장으로 돌아가기
    </a>

  </div>

  <script src="bridge.js"></script>
  <script>
    function loadNotices() {
      showLoading("마을 사료 보관소에서 공지를 호출 중...");
      if (typeof google === 'undefined') {
        hideLoading();
        renderNotices([]);
        return;
      }
      google.script.run
        .withSuccessHandler(list => {
          hideLoading();
          renderNotices(list);
        })
        .getVillageNotices();
    }

    function renderNotices(list) {
      const container = document.getElementById('noticeList');
      if (!list || list.length === 0) {
        container.innerHTML = `
          <div class="scroll-card" style="text-align:center; padding:40px;">
            <div style="font-size: 2.5rem; margin-bottom: 15px;">🏺</div>
            <div class="title" style="border:none; text-align:center;">보관된 중대사가 없습니다</div>
            <div class="content" style="text-align:center;">마을이 평화롭고 조용하여 기록에 남을 특별한 소식이 없습니다.</div>
          </div>
        `;
        return;
      }

      container.innerHTML = list.map(n => `
        <div class="scroll-card">
          <div class="scroll-handle-left"></div>
          <span class="category">📜 ${n.category || '공지'}</span>
          <div class="title">${n.content.split('|')[0] || n.content}</div>
          <div class="content">${n.content.split('|')[1] || n.content}</div>
          <div class="date"><i class="fa-regular fa-clock"></i> 선포일: ${n.date}</div>
        </div>
      `).join('');
    }

    function showLoading(msg) {
        const overlay = document.getElementById('v-loading');
        const msgEl = document.getElementById('v-loading-msg');
        if (overlay && msgEl) {
            msgEl.innerText = msg;
            overlay.style.display = 'flex';
        }
    }

    function hideLoading() {
        const overlay = document.getElementById('v-loading');
        if (overlay) overlay.style.display = 'none';
    }

    window.onload = function() {
      Auth.check();
      loadNotices();
    };
  </script>
</body>
</html>
