<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GENIE WORLD - 지니클럽 솔루션</title>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #7c3aed;
      --primary-glow: rgba(124, 58, 237, 0.5);
      --gold: #f59e0b;
      --emerald: #10b981;
      --bg-dark: #0a0e17;
      --glass: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text-main: #f8fafc;
      --text-dim: #94a3b8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
    
    body { 
      background: var(--bg-dark);
      background-image: 
        radial-gradient(circle at 0% 0%, rgba(124, 58, 237, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 100% 100%, rgba(245, 158, 11, 0.05) 0%, transparent 50%);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
      padding-bottom: 100px;
    }

    /* 📜 전령의 기둥 (Messenger's Pillar - Ticker) */
    .messenger-pillar {
      background: linear-gradient(90deg, transparent, rgba(124, 58, 237, 0.2), transparent);
      height: 30px; display: flex; align-items: center; overflow: hidden;
      border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 900;
      backdrop-filter: blur(10px);
    }
    .ticker-content {
      white-space: nowrap; animation: ticker 20s linear infinite;
      font-size: 0.8rem; font-weight: 600; color: var(--text-dim);
    }
    @keyframes ticker {
      0% { transform: translateX(100vw); }
      100% { transform: translateX(-100%); }
    }

    /* 🔮 지니 게이트 (Genie Gate) */
    .genie-gate {
      position: fixed; bottom: 100px; right: 20px; z-index: 999;
      width: 65px; height: 65px; border-radius: 50%;
      background: radial-gradient(circle, #a78bfa, #7c3aed);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 30px var(--primary-glow), inset 0 0 15px rgba(255,255,255,0.4);
      cursor: pointer; border: 2px solid rgba(255,255,255,0.3);
      animation: gateFloat 4s infinite ease-in-out;
    }
    @keyframes gateFloat {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(10deg); }
    }

    .container { width: 100%; max-width: 500px; margin: 0 auto; padding: 20px; }

    /* 🏰 지니 길드 본부 (Guild HQ) */
    .guild-hq {
      background: linear-gradient(180deg, rgba(30, 41, 59, 0.5), rgba(15, 23, 42, 0.8));
      border-radius: 40px; padding: 30px;
      border: 1px solid var(--glass-border);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      margin-bottom: 25px; position: relative; overflow: hidden;
    }
    .guild-hq::before {
      content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.05) 0%, transparent 70%);
    }

    .member-profile { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; position: relative; }
    .avatar-vault {
      width: 90px; height: 90px; background: var(--glass); border-radius: 30px;
      display: flex; align-items: center; justify-content: center; font-size: 3.5rem;
      border: 2px solid var(--gold); box-shadow: 0 0 20px rgba(245, 158, 11, 0.2);
    }
    .profile-info h1 { font-size: 1.8rem; font-weight: 900; letter-spacing: -1px; }
    .rank-tag {
      display: inline-block; padding: 4px 10px; background: rgba(245, 158, 11, 0.15);
      border-radius: 8px; font-size: 0.75rem; font-weight: 800; color: var(--gold); margin-bottom: 6px;
    }

    /* 🗡️ 스탯 매핑 (Stat Mapping) */
    .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
    .stat-card {
      background: rgba(0,0,0,0.3); border-radius: 20px; padding: 15px 10px; text-align: center;
      border: 1px solid rgba(255,255,255,0.03); transition: transform 0.3s;
    }
    .stat-card:active { transform: scale(0.95); }
    .stat-icon { font-size: 1.5rem; margin-bottom: 8px; display: block; filter: drop-shadow(0 0 5px rgba(255,255,255,0.2)); }
    .stat-label { font-size: 0.65rem; color: var(--text-dim); font-weight: 700; margin-bottom: 4px; display: block; }
    .stat-value { font-size: 1.1rem; font-weight: 900; }

    /* 📈 레벨 프로그레스 */
    .exp-bar-container { margin-top: 10px; }
    .exp-header { display: flex; justify-content: space-between; font-size: 0.75rem; font-weight: 800; margin-bottom: 10px; }
    .exp-track { height: 12px; background: rgba(0,0,0,0.5); border-radius: 6px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
    .exp-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #7c3aed, #f59e0b); border-radius: 6px; transition: width 1.5s cubic-bezier(0.34, 1.56, 0.64, 1); }

    /* 🏝️ 모험가의 오아시스 (Oasis) & 제단 (Altar) */
    .quick-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
    .action-btn {
      background: var(--glass); border-radius: 24px; padding: 20px; border: 1px solid var(--glass-border);
      display: flex; flex-direction: column; gap: 10px; text-decoration: none; color: white;
    }
    .action-btn .icon { font-size: 2rem; }
    .action-btn .title { font-size: 1rem; font-weight: 800; }
    .action-btn .desc { font-size: 0.7rem; color: var(--text-dim); font-weight: 600; }

    /* 📜 데일리 습관 퀘스트 (The 9 Habits) */
    .habit-section { background: var(--glass); border-radius: 32px; padding: 25px; border: 1px solid var(--glass-border); }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .section-header h2 { font-size: 1.1rem; font-weight: 900; display: flex; align-items: center; gap: 8px; }
    .section-header .count { font-size: 0.8rem; background: var(--gold); color: black; padding: 2px 8px; border-radius: 10px; font-weight: 900; }

    .habit-list { display: flex; flex-direction: column; gap: 12px; }
    .habit-item {
      background: rgba(0,0,0,0.2); border-radius: 18px; padding: 15px;
      display: flex; align-items: center; gap: 15px; border: 1px solid rgba(255,255,255,0.02);
      transition: all 0.2s; cursor: pointer;
    }
    .habit-item.done { opacity: 0.5; background: rgba(16, 185, 129, 0.05); border-color: rgba(16, 185, 129, 0.2); }
    .habit-check {
      width: 28px; height: 28px; border: 2px solid rgba(255,255,255,0.1); border-radius: 8px;
      display: flex; align-items: center; justify-content: center; font-size: 1rem;
    }
    .habit-item.done .habit-check { background: var(--emerald); border-color: var(--emerald); color: white; }
    .habit-content h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 2px; }
    .habit-content p { font-size: 0.7rem; color: var(--text-dim); }
    .habit-exp { margin-left: auto; font-size: 0.75rem; font-weight: 900; color: var(--gold); }

    /* 📱 네비게이션 */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; width: 100%;
      background: rgba(10, 14, 23, 0.95); backdrop-filter: blur(20px);
      display: flex; justify-content: space-around; padding: 12px 10px 30px;
      border-top: 1px solid var(--glass-border); z-index: 1000;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      color: var(--text-dim); text-decoration: none; font-size: 0.65rem; font-weight: 800;
    }
    .nav-item.active { color: var(--primary-light); }
    .nav-item.active .nav-icon { color: var(--primary-light); filter: drop-shadow(0 0 8px var(--primary-glow)); }
    .nav-icon { font-size: 1.6rem; color: var(--text-dim); }

    /* 🔮 로딩 애니메이션 (Genie Gate Transition) */
    #loading-overlay {
      position: fixed; inset: 0; background: var(--bg-dark); z-index: 2000;
      display: none; flex-direction: column; align-items: center; justify-content: center;
      gap: 20px;
    }
    .portal-loader {
      width: 100px; height: 100px; border: 4px solid var(--primary);
      border-top-color: transparent; border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- 📜 전령의 기둥 -->
  <div class="messenger-pillar">
    <div class="ticker-content">
      📢 마을 소식: 이번 주 [다이어트 킹] 경쟁이 치열합니다! | 퀘스트 알림: 식단 인증 시 보너스 경험치 지급 중! | 명예의 전당: 1위 김모험 님이 그랜드 슬래머에 등극했습니다.
    </div>
  </div>

  <div class="container">
    <!-- 🏰 지니 길드 본부 -->
    <div class="guild-hq">
      <div class="member-profile">
        <div class="avatar-vault" id="avatar-icon">🌱</div>
        <div class="profile-info">
          <span class="rank-tag" id="rank-name">신입 모험가</span>
          <h1 id="user-name">모험가 님</h1>
        </div>
      </div>

      <!-- 🗡️ 스탯 매핑 -->
      <div class="stat-grid">
        <div class="stat-card">
          <span class="stat-icon">🗡️</span>
          <span class="stat-label">지방파괴력</span>
          <span class="stat-value" id="stat-atk">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-icon">🛡️</span>
          <span class="stat-label">요요저항력</span>
          <span class="stat-value" id="stat-def">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-icon">🔥</span>
          <span class="stat-label">활동에너지</span>
          <span class="stat-value" id="stat-energy">0</span>
        </div>
      </div>

      <div class="exp-bar-container">
        <div class="exp-header">
          <span>Level Progress</span>
          <span id="exp-txt">0 / 100 EXP</span>
        </div>
        <div class="exp-track">
          <div class="exp-fill" id="exp-fill"></div>
        </div>
      </div>
    </div>

    <!-- 🏝️ 오아시스 & 제단 바로가기 -->
    <div class="quick-actions">
      <a href="miracle.html" class="action-btn">
        <span class="icon">🔥</span>
        <span class="title">기적의 제단</span>
        <span class="desc">식단 및 활동 인증 봉헌</span>
      </a>
      <a href="community.html" class="action-btn">
        <span class="icon">🏝️</span>
        <span class="title">모험가 오아시스</span>
        <span class="desc">동료들과의 따뜻한 소통</span>
      </a>
    </div>

    <!-- 📜 9대 습관 퀘스트 -->
    <div class="habit-section">
      <div class="section-header">
        <h2>📜 데일리 9대 습관</h2>
        <span class="count" id="habit-count">0/9</span>
      </div>
      <div class="habit-list" id="habit-list">
        <!-- JS로 생성 예정 -->
      </div>
    </div>
  </div>

  <!-- 🔮 지니 게이트 (FAB) -->
  <a href="miracle.html" class="genie-gate" id="fab-gate">
    <span>🔮</span>
  </a>

  <!-- 📱 하단 네비게이션 -->
  <div class="bottom-nav">
    <a href="index.html" class="nav-item active">
      <span class="nav-icon">🏰</span>
      <span>본부</span>
    </a>
    <a href="halloffame.html" class="nav-item">
      <span class="nav-icon">🏆</span>
      <span>전당</span>
    </a>
    <a href="miracle.html" class="nav-item">
      <span class="nav-icon">✨</span>
      <span>성소</span>
    </a>
    <a href="community.html" class="nav-item">
      <span class="nav-icon">💬</span>
      <span>오아시스</span>
    </a>
    <a href="notice.html" class="nav-item">
      <span class="nav-icon">📜</span>
      <span>보물고</span>
    </a>
  </div>

  <!-- 🔮 로딩 오버레이 -->
  <div id="loading-overlay">
    <div class="portal-loader"></div>
    <p style="color: var(--primary-light); font-weight: 800;">공간 이동 중...</p>
  </div>

  <script>
    const TARGET_PHONE = '<?= targetPhone ?>';
    const TARGET_NAME = '<?= targetName ?>';

    const HABITS = [
      { id: 'morning_tea', title: '모닝 티', desc: '따뜻한 물 한잔으로 대사 점화', exp: 2 },
      { id: 'morning_stretch', title: '모닝 스트레칭', desc: '5분 전신 스트레칭', exp: 2 },
      { id: 'veggie_first', title: '베지 퍼스트', desc: '채소 먼저 먹기', exp: 2 },
      { id: 'slow_chew', title: '슬로우 치잉', desc: '20회 이상 천천히 씹기', exp: 2 },
      { id: 'step_7k', title: '세븐 사우전드', desc: '일일 7,000보 달성', exp: 3 },
      { id: 'stair_magic', title: '스테어 마법', desc: '3층 이하 계단 이용', exp: 2 },
      { id: 'night_cut', title: '나이트 컷', desc: '20시 이후 야식 금지', exp: 10 },
      { id: 'good_sleep', title: '굿 슬립', desc: '자정 전 취침', exp: 2 },
      { id: 'self_praise', title: '셀프 칭찬', desc: '나를 위한 한 줄 칭찬', exp: 2 }
    ];

    window.onload = function() {
      if (TARGET_NAME) document.getElementById('user-name').innerText = TARGET_NAME + " 님";
      renderHabits();
      if (TARGET_PHONE) loadMemberData();
    };

    function renderHabits() {
      const list = document.getElementById('habit-list');
      list.innerHTML = HABITS.map(h => `
        <div class="habit-item" id="habit-${h.id}" onclick="toggleHabit('${h.id}', ${h.exp})">
          <div class="habit-check">✓</div>
          <div class="habit-content">
            <h3>${h.title}</h3>
            <p>${h.desc}</p>
          </div>
          <div class="habit-exp">+${h.exp} EXP</div>
        </div>
      `).join('');
    }

    function loadMemberData() {
      google.script.run.withSuccessHandler(res => {
        if (res.success) {
          const s = res.status;
          updateDashboard(s, res.today);
        }
      }).get33ChallengeStatus(TARGET_PHONE);
    }

    function updateDashboard(status, today) {
      // 1. 아바타 및 칭호
      const avatarIcon = document.getElementById('avatar-icon');
      const rankName = document.getElementById('rank-name');
      
      const avatars = ["🌱", "🌿", "🌳", "🌸", "🧚‍♂️", "👑", "🌌"];
      const ranks = ["신입 모험가", "성실한 모험가", "습관의 달인", "지니의 친구", "꿈나무 요정", "전설의 점퍼", "지니 월드 수호신"];
      
      const stage = Math.min(status.level - 1, 6);
      avatarIcon.innerText = avatars[stage];
      rankName.innerText = ranks[stage];

      // 2. 스탯 매핑
      document.getElementById('stat-atk').innerText = Math.floor(status.totalExp / 10);
      document.getElementById('stat-def').innerText = Math.floor(status.totalExp / 15);
      document.getElementById('stat-energy').innerText = today.water || 0;

      // 3. 경험치 바
      const progress = (status.totalExp % 100);
      document.getElementById('exp-fill').style.width = progress + "%";
      document.getElementById('exp-txt').innerText = status.totalExp + " EXP";

      // 4. 습관 체크 표시
      if (today.habits) {
        today.habits.forEach(h => {
          const el = document.getElementById('habit-' + h);
          if (el) el.classList.add('done');
        });
        document.getElementById('habit-count').innerText = today.habits.length + "/9";
      }
    }

    function toggleHabit(id, exp) {
      const el = document.getElementById('habit-' + id);
      if (el.classList.contains('done')) return; // 이미 완료된 건 수정 불가 (정책에 따라 변경 가능)

      const confirmed = confirm(`[${id}] 습관을 실천하셨나요? +${exp} EXP를 획득합니다.`);
      if (confirmed) {
        google.script.run.withSuccessHandler(res => {
          if (res.success) {
            el.classList.add('done');
            loadMemberData(); // 대시보드 갱신
          }
        }).submit33Action({
          phone: TARGET_PHONE,
          name: TARGET_NAME,
          type: '습관',
          item: id,
          score: exp
        });
      }
    }

    // 공간 이동 연출
    document.querySelectorAll('.nav-item, .action-btn, .genie-gate').forEach(btn => {
      btn.addEventListener('click', (e) => {
        // e.preventDefault();
        // showPortal();
        // setTimeout(() => { window.location.href = btn.href; }, 800);
      });
    });

    function showPortal() {
      document.getElementById('loading-overlay').style.display = 'flex';
    }
  </script>
</body>
</html>
