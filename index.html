<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>노형 점핑 & 테라피 | 통합 포털</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
            --card-hover: rgba(255, 255, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
            background: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            color: var(--text-color);
        }

        .container {
            width: 100%;
            max-width: 1000px;
            padding: 40px 20px;
            text-align: center;
            z-index: 1;
        }

        .header {
            margin-bottom: 60px;
            animation: fadeInDown 0.8s ease-out;
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            margin-bottom: 15px;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            font-size: 1.1rem;
            color: #94a3b8;
            font-weight: 300;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            perspective: 1000px;
        }

        .menu-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 20px;
            text-decoration: none;
            color: var(--text-color);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            animation: fadeInUp 0.8s ease-out both;
        }

        .menu-card:nth-child(1) { animation-delay: 0.1s; }
        .menu-card:nth-child(2) { animation-delay: 0.2s; }
        .menu-card:nth-child(3) { animation-delay: 0.3s; }
        .menu-card:nth-child(4) { animation-delay: 0.4s; }

        .menu-card:hover {
            transform: translateY(-10px) scale(1.02);
            background: var(--card-hover);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            transition: transform 0.3s ease;
        }

        .menu-card:hover .icon-box {
            transform: rotate(10deg);
        }

        .menu-card h2 {
            font-size: 1.4rem;
            font-weight: 600;
        }

        .menu-card span {
            font-size: 0.85rem;
            color: #94a3b8;
            font-weight: 300;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            .header h1 { font-size: 2.2rem; }
            .menu-grid { grid-template-columns: 1fr 1fr; }
            .menu-card { padding: 30px 15px; }
            .icon-box { width: 60px; height: 60px; font-size: 2rem; }
            .menu-card h2 { font-size: 1.1rem; }
        }

        .footer {
            margin-top: 60px;
            font-size: 0.85rem;
            color: #475569;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>NOHYUNG JUMPING</h1>
            <p>노형 점핑 & 테라피 통합 관리 시스템</p>
        </div>

        <div class="menu-grid">
            <!-- 1. 출석확인 -->
            <a href="attendance.html" class="menu-card">
                <div class="icon-box">🕒</div>
                <h2>출석 확인</h2>
                <span>오늘의 출석 현황 보기</span>
            </a>

            <!-- 2. 테라피 예약 -->
            <a href="reservation.html" class="menu-card">
                <div class="icon-box">📅</div>
                <h2>테라피 예약</h2>
                <span>간편한 수업 예약 신청</span>
            </a>

            <!-- 3. 회원가입 -->
            <a href="registration.html" class="menu-card">
                <div class="icon-box">📝</div>
                <h2>회원가입</h2>
                <span>신규 회원 정보 등록</span>
            </a>

            <!-- 4. 관리자 대시보드 -->
            <a href="admin.html" class="menu-card">
                <div class="icon-box">📊</div>
                <h2>관리자 대시보드</h2>
                <span>통계 및 전체 회원 관리</span>
            </a>
        </div>

        <div class="footer">
            &copy; 2026 Nohyung Jumping & Therapy. All rights reserved.
        </div>
    </div>
</body>
</html>
