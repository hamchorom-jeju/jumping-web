<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GENIE WORLD - Status Window</title>
    <!-- Game Status CSS -->
    <link rel="stylesheet" href="index.css">
    <!-- Icon Library -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="status-window">
        
        <!-- 📋 STATUS HEADER -->
        <section class="status-header">
            <div class="avatar-frame">
                <div id="avatar-icon">🤴</div>
            </div>
            <div class="status-info">
                <span class="tier-label" id="tier-name">LEGENDARY JUMPER</span>
                <h1 style="font-size: 1.5rem; font-weight: 900;"><span id="user-name">모험가</span> 님의 상태창</h1>
                
                <div class="exp-bar-container">
                    <div class="exp-bar-fill" id="lifetime-exp-bar" style="width: 82%;"></div>
                </div>
                <p style="font-size: 0.75rem; color: var(--text-dim); margin-top: 8px; font-weight: 800;">
                    LIFETIME TOTAL: <span id="lifetime-exp-val" style="color: var(--primary);">84,200</span> EXP
                </p>
            </div>
        </section>

        <!-- 📊 EVALUATION BOARD -->
        <section class="eval-board">
            <div class="eval-card">
                <span class="eval-label">WEEKLY GROWTH</span>
                <span class="eval-value" id="weekly-rank">2<span class="unit">위</span></span>
            </div>
            <div class="eval-card">
                <span class="eval-label">SEASON SCORE</span>
                <span class="eval-value" id="monthly-pts">4,500<span class="unit">pts</span></span>
            </div>
            <div class="eval-card" style="grid-column: span 2; display: flex; justify-content: space-around; padding: 10px;">
                <div style="text-align: center;">
                    <span class="eval-label">FAT🗡️</span>
                    <span class="eval-value" id="stat-fat" style="font-size: 0.9rem;">12.5</span>
                </div>
                <div style="text-align: center;">
                    <span class="eval-label">YOYO🛡️</span>
                    <span class="eval-value" id="stat-muscle" style="font-size: 0.9rem;">34.2</span>
                </div>
                <div style="text-align: center;">
                    <span class="eval-label">NRG🔥</span>
                    <span class="eval-value" id="stat-energy" style="font-size: 0.9rem;">1,200</span>
                </div>
            </div>
        </section>

        <!-- ⚔️ QUEST HUB -->
        <section class="quest-hub">
            <h2 class="quest-category-title"><i class="fa-solid fa-scroll" style="color: var(--gold);"></i> ACTIVE QUESTS</h2>
            
            <div class="quest-grid">
                <!-- General Quest -->
                <div class="quest-card" onclick="location.href='miracle.html?cat=general'">
                    <img src="file:///C:/Users/ksr74/.gemini/antigravity/brain/40241415-08a1-4bd7-9c7c-0fcd511b8ff4/genie_world_altar_of_miracles_ui_1778725054432.png" class="quest-icon-img">
                    <span class="quest-name">일반 퀘스트</span>
                    <span class="quest-reward">+15 EXP</span>
                </div>
                
                <!-- Daily Habits -->
                <div class="quest-card" onclick="toggleHabits()">
                    <img src="file:///C:/Users/ksr74/.gemini/antigravity/brain/40241415-08a1-4bd7-9c7c-0fcd511b8ff4/genie_world_water_slider_and_quest_ui_3d_1778729508208.png" class="quest-icon-img">
                    <span class="quest-name">데일리 습관</span>
                    <span class="quest-reward">+50 EXP Total</span>
                </div>

                <!-- Bonus Plus -->
                <div class="quest-card" onclick="location.href='miracle.html?cat=plus'">
                    <img src="file:///C:/Users/ksr74/.gemini/antigravity/brain/40241415-08a1-4bd7-9c7c-0fcd511b8ff4/genie_world_7_stage_evolution_badges_3d_1778728530062.png" class="quest-icon-img">
                    <span class="quest-name">미라클 플러스</span>
                    <span class="quest-reward">BONUS EXP</span>
                </div>

                <!-- Sudden Quest -->
                <div class="quest-card" style="border: 2px solid var(--accent);" onclick="location.href='miracle.html?cat=sudden'">
                    <img src="file:///C:/Users/ksr74/.gemini/antigravity/brain/40241415-08a1-4bd7-9c7c-0fcd511b8ff4/genie_world_admin_sanctum_ui_1778725102561.png" class="quest-icon-img">
                    <span class="quest-name">이장님 돌발미션</span>
                    <span class="quest-reward">SPECIAL REWARD</span>
                </div>
            </div>
        </section>

        <!-- 💧 WATER HUNTER -->
        <section class="water-hunter-box">
            <div style="display: flex; justify-content: space-between; font-weight: 800; font-size: 0.85rem;">
                <span><i class="fa-solid fa-droplet" style="color: var(--accent);"></i> WATER HUNTER</span>
                <span id="water-val">1.2L / 2.0L</span>
            </div>
            <input type="range" class="custom-range" id="water-range" min="0" max="20" value="12">
        </section>

    </div>

    <!-- 📱 SYSTEM NAV -->
    <nav class="status-nav">
        <a href="index.html" class="nav-item active">
            <i class="fa-solid fa-id-card"></i>
            <span>상태창</span>
        </a>
        <a href="rank.html" class="nav-item">
            <i class="fa-solid fa-ranking-star"></i>
            <span>전당</span>
        </a>
        <a href="miracle.html" class="nav-item">
            <i class="fa-solid fa-camera-retro"></i>
            <span>기록소</span>
        </a>
        <a href="community.html" class="nav-item">
            <i class="fa-solid fa-comments"></i>
            <span>오아시스</span>
        </a>
        <a href="gate.html" class="nav-item">
            <i class="fa-solid fa-door-open"></i>
            <span>게이트</span>
        </a>
    </nav>

    <script src="dashboard.js"></script>
</body>
</html>
