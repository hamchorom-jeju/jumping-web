<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NOHYUNG WORLD - 디지털 광장</title>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6b46c1;
      --primary-light: #9f7aea;
      --accent: #f6ad55;
      --gold: #ecc94b;
      --bg-dark: #0f172a;
      --glass: rgba(255, 255, 255, 0.08);
      --glass-dark: rgba(0, 0, 0, 0.4);
      --text-white: #ffffff;
      --shadow-premium: 0 20px 50px rgba(0, 0, 0, 0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
    
    body { 
      background: var(--bg-dark);
      background-image: 
        radial-gradient(circle at 0% 0%, #1e1b4b 0%, #0f172a 50%, #1e1b4b 100%);
      color: var(--text-white);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }

    /* 상단 마법진 (예약 포탈) */
    .magic-portal {
      position: fixed; top: 25px; right: 25px; z-index: 100;
      width: 55px; height: 55px;
      background: linear-gradient(135deg, var(--primary), var(--secondary, #ed64a6));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 20px rgba(107, 70, 193, 0.6);
      border: 2px solid rgba(255,255,255,0.3);
      cursor: pointer; animation: pulse 2s infinite;
      text-decoration: none;
    }
    .magic-portal span { font-size: 1.5rem; }
    @keyframes pulse {
      0% { transform: scale(1); box-shadow: 0 0 10px rgba(107, 70, 193, 0.6); }
      50% { transform: scale(1.1); box-shadow: 0 0 30px rgba(107, 70, 193, 0.8); }
      100% { transform: scale(1); box-shadow: 0 0 10px rgba(107, 70, 193, 0.6); }
    }

    .container {
      width: 100%; max-width: 600px; margin: 0 auto; padding: 30px 20px 120px;
    }

    header { margin-bottom: 30px; }
    .logo-area { font-size: 1.8rem; font-weight: 900; letter-spacing: -1.5px; color: var(--primary-light); text-shadow: 0 0 15px rgba(159, 122, 234, 0.3); }

    /* 🏛️ [1] 중앙: 길드 사무소 (나의 상태창) */
    .guild-section {
      background: linear-gradient(145deg, rgba(107, 70, 193, 0.4), rgba(0, 0, 0, 0.3));
      border-radius: 35px; padding: 30px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: var(--shadow-premium);
      margin-bottom: 25px;
      backdrop-filter: blur(20px);
    }
    .avatar-area { display: flex; align-items: center; gap: 20px; margin-bottom: 25px; }
    .avatar-circle {
      width: 85px; height: 85px; background: white; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; font-size: 3.2rem;
      border: 4px solid var(--gold); box-shadow: 0 0 25px rgba(236, 201, 75, 0.4);
    }
    .user-info h1 { font-size: 1.6rem; font-weight: 800; margin-bottom: 4px; }
    .user-info .rank-title { color: var(--gold); font-weight: 800; font-size: 0.95rem; }

    .exp-container { margin-bottom: 10px; }
    .exp-bar-bg { background: rgba(0,0,0,0.4); height: 14px; border-radius: 7px; overflow: hidden; margin-top: 8px; border: 1px solid rgba(255,255,255,0.05); }
    .exp-bar-fill { background: linear-gradient(to right, var(--gold), #f6ad55); height: 100%; width: 65%; border-radius: 7px; box-shadow: 0 0 15px var(--gold); }
    .exp-text { display: flex; justify-content: space-between; font-size: 0.85rem; font-weight: 800; color: rgba(255,255,255,0.7); }

    /* 🧱 [2, 3] 좌우 벽보 (랭킹 & 소식) */
    .plaza-billboards {
      display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px;
    }
    .billboard {
      background: var(--glass-dark); border-radius: 25px; padding: 20px;
      border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
    }
    .billboard h2 { font-size: 1.05rem; font-weight: 800; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; color: var(--primary-light); }
    .rank-row { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 10px; font-weight: 700; }
    .rank-row.top { color: var(--gold); }

    /* 🎯 실시간 퀘스트 목록 (길드 임무) */
    .quest-list { margin-bottom: 30px; }
    .section-title { font-size: 1.2rem; font-weight: 800; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
    .quest-item {
      background: var(--glass); border-radius: 22px; padding: 22px; margin-bottom: 14px;
      display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .quest-content h3 { font-size: 1.05rem; font-weight: 800; margin-bottom: 4px; }
    .quest-content p { font-size: 0.85rem; opacity: 0.5; font-weight: 600; }
    .quest-btn { background: var(--primary); color: white; border: none; padding: 12px 22px; border-radius: 12px; font-weight: 800; font-size: 0.85rem; box-shadow: 0 5px 15px rgba(107, 70, 193, 0.3); }

    /* 📱 하단 탭 내비게이션 (숙소, 성소, 마당) */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; width: 100%;
      background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(30px);
      display: flex; justify-content: space-around; padding: 20px 10px 40px;
      border-top: 1px solid rgba(255,255,255,0.1); z-index: 200;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      color: rgba(255,255,255,0.4); text-decoration: none; font-size: 0.75rem; font-weight: 800;
    }
    .nav-item.active { color: var(--primary-light); }
    .nav-icon { font-size: 1.6rem; }

    /* 수분 게이지 특수 디자인 */
    .water-gauge {
      background: linear-gradient(135deg, #2b6cb0, #4299e1);
      border-radius: 25px; padding: 22px; margin-bottom: 25px; box-shadow: 0 10px 20px rgba(43, 108, 176, 0.3);
    }
  </style>
</head>
<body>

  <!-- ✨ 이동 마법진 (테라피 예약 포탈) -->
  <a href="?page=reservation" class="magic-portal">
    <span>🔮</span>
  </a>

  <div class="container">
    <header>
      <div class="logo-area">NOHYUNG WORLD</div>
      <div style="font-size: 0.85rem; color: #94a3b8; font-weight: 500;">디지털 광장 - 시즌 1 [시작되는 전설]</div>
    </header>

    <!-- 🏛️ [1] 중앙 광장: 길드 사무소 (상태창) -->
    <div class="guild-section">
      <div class="avatar-area">
        <div class="avatar-circle">🌱</div>
        <div class="user-info">
          <div class="rank-title">Lv.5 꿈나무 모험가</div>
          <h1 id="user-name">모험가님</h1>
          <div style="font-size: 0.8rem; opacity: 0.7; font-weight: 500;">"오늘도 지방을 파괴하러 오셨군요!"</div>
        </div>
      </div>
      <div class="exp-container">
        <div class="exp-text">
          <span>EXP</span>
          <span id="exp-val">750 / 1000</span>
        </div>
        <div class="exp-bar-bg">
          <div class="exp-bar-fill" id="exp-fill" style="width: 75%;"></div>
        </div>
      </div>
    </div>

    <!-- 🧱 [2, 3] 광장 벽보 (랭킹 & 소식) -->
    <div class="plaza-billboards">
      <div class="billboard">
        <h2>🏆 명예의 전당</h2>
        <div class="rank-row top">🥇 이영희</div>
        <div class="rank-row">🥈 박지민</div>
        <div class="rank-row">🥉 최우식</div>
      </div>
      <div class="billboard">
        <h2>📢 마을 소식</h2>
        <div style="font-size: 0.85rem; line-height: 1.5; font-weight: 600; opacity: 0.9;">
          "수요일은 인바디 데이! 모두 모여주세요! 🔥"
        </div>
      </div>
    </div>

    <!-- 🎯 [4] 오늘의 임무 (퀘스트) -->
    <div class="quest-list">
      <div class="section-title">🗡️ 오늘의 퀘스트</div>

      <div class="water-gauge">
        <div style="display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: 800;">
          <span>💧 워터 헌터</span>
          <span id="water-txt">1.2L / 2.0L</span>
        </div>
        <input type="range" style="width: 100%; height: 10px; border-radius: 5px; -webkit-appearance: none; background: rgba(255,255,255,0.2);" min="0" max="20" value="12">
      </div>

      <div class="quest-item">
        <div class="quest-content">
          <h3>🥗 식단 마스터</h3>
          <p>건강한 식단 인증샷 남기기</p>
        </div>
        <button class="quest-btn">인증하기</button>
      </div>

      <div class="quest-item">
        <div class="quest-content">
          <h3>🚶 미라클 성소</h3>
          <p>계단 이용 & 기적의 습관</p>
        </div>
        <button class="quest-btn">기록하기</button>
      </div>
    </div>
  </div>

  <!-- 📱 하단 탭 내비게이션 -->
  <div class="bottom-nav">
    <a href="?page=index" class="nav-item active">
      <span class="nav-icon">🏯</span>
      <span>광장</span>
    </a>
    <a href="?page=halloffame" class="nav-item">
      <span class="nav-icon">🥇</span>
      <span>순위표</span>
    </a>
    <a href="?page=miracle" class="nav-item">
      <span class="nav-icon">🥗</span>
      <span>성소</span>
    </a>
    <a href="?page=community" class="nav-item">
      <span class="nav-icon">💬</span>
      <span>숙소</span>
    </a>
    <a href="?page=notice" class="nav-item">
      <span class="nav-icon">📜</span>
      <span>소식지</span>
    </a>
  </div>

  <script>
    const TARGET_PHONE = '<?= targetPhone ?>';
    const TARGET_NAME = '<?= targetName ?>';

    window.onload = function() {
      if (TARGET_NAME) document.getElementById('user-name').innerText = TARGET_NAME + " 님";
      if (TARGET_PHONE) loadChallengeData();
    };

    function loadChallengeData() {
      google.script.run.withSuccessHandler(res => {
        if (res.success) {
          const s = res.status;
          document.querySelector('.rank-title').innerText = "Lv." + s.level + " " + getLevelTitle(s.level);
          const progress = (s.totalExp % 100);
          document.getElementById('exp-fill').style.width = progress + "%";
          document.getElementById('exp-val').innerText = s.totalExp + " EXP";
          document.getElementById('water-txt').innerText = (res.today.water / 10).toFixed(1) + "L / 2.0L";
        }
      }).get33ChallengeStatus(TARGET_PHONE);
    }

    function getLevelTitle(lv) {
      if (lv < 5) return "입문 모험가";
      if (lv < 10) return "꿈나무 모험가";
      return "숙련된 모험가";
    }
  </script>
</body>
</html>
