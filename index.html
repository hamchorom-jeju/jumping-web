<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GENIE WORLD - Nohyung Village v44.3</title>
    <!-- Premium Restoration v44.3 CSS -->
    <link rel="stylesheet" href="index.css">
    <!-- Icon Library -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- 🏛️ PREMIUM GLOBAL HEADER -->
    <header class="v-global-header">
        <h1><i class="fa-solid fa-crown"></i> GENIE WORLD : 노형 빌리지</h1>
    </header>

    <div class="v-container">
        
        <!-- 📜 PREMIUM BANNERS -->
        <div class="v-banner-notice">
            <i class="fa-solid fa-scroll"></i> [마을 공지] 33 챌린지 시즌 4주차 결산 (목) 20시 이후 금식 엄수!
        </div>

        <div class="v-banner-ranking" id="ranking-ticker">
            금주 체력왕: 홍길동 님 ✨
        </div>

        <div class="v-sudden-bar" id="sudden-mission-bar">
            ⚡ [보너스 퀘스트] 지금 바로 플랭크 인증 시 방어력 +20 EXP!
        </div>

        <!-- 📋 모험가 상태창 (v44.3 Hero Layout) -->
        <section class="status-window-v43">
            <!-- Left: Hero Card -->
            <div class="profile-card">
                <div class="avatar-v43">🧚‍♂️</div>
                <h2 style="font-size: 1.1rem; font-weight: 900; color: var(--v-wood);"><span id="user-name">모험가</span> 님</h2>
                <span style="font-size: 0.75rem; font-weight: 800; color: var(--emerald); display: block; margin-bottom: 15px;">꿈나무 요정</span>
                
                <span style="font-size: 0.6rem; font-weight: 900; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px;">Experience</span>
                <span class="total-score-val" id="total-score">84,200</span>
                
                <!-- Sleek Evolution Bar -->
                <div class="evo-bar-container">
                    <div class="evo-bar-fill" id="evo-bar" style="width: 85%;"></div>
                </div>
                <div style="display: flex; justify-content: space-between; font-size: 0.6rem; font-weight: 900; color: var(--text-dim); margin-top: 5px;">
                    <span>NEXT: 전설</span>
                    <span id="evo-percent">85%</span>
                </div>
                
                <div style="background: var(--v-wood); color: var(--gold); padding: 5px 15px; border-radius: 12px; font-size: 0.9rem; font-weight: 900; display: inline-block; margin-top: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">랭킹 <span id="current-rank">12</span>위</div>
            </div>

            <!-- Right: Ability Mastery Gauges -->
            <div class="gauge-section">
                <!-- Toggle Switch -->
                <div class="perspective-toggle">
                    <button id="btn-weekly" class="toggle-btn active" onclick="Village.setPerspective('weekly')">주간</button>
                    <button id="btn-monthly" class="toggle-btn" onclick="Village.setPerspective('monthly')">월간</button>
                </div>

                <!-- Mastery Gauges -->
                <div class="gauge-item">
                    <div class="gauge-header">
                        <span style="color: var(--health);"><i class="fa-solid fa-heart-pulse"></i> 체력</span>
                        <span id="health-val">15,400</span>
                    </div>
                    <div class="gauge-bar-bg">
                        <div class="gauge-fill" id="health-bar" style="width: 75%; background: linear-gradient(to right, #ff4757, #ff6b81);"></div>
                    </div>
                </div>

                <div class="gauge-item">
                    <div class="gauge-header">
                        <span style="color: var(--perf);"><i class="fa-solid fa-hand-fist"></i> 수행력</span>
                        <span id="perf-val">24,500</span>
                    </div>
                    <div class="gauge-bar-bg">
                        <div class="gauge-fill" id="perf-bar" style="width: 65%; background: linear-gradient(to right, #ffa502, #ff7f50);"></div>
                    </div>
                </div>

                <div class="gauge-item">
                    <div class="gauge-header">
                        <span style="color: var(--def);"><i class="fa-solid fa-shield-halved"></i> 방어력</span>
                        <span id="def-val">18,200</span>
                    </div>
                    <div class="gauge-bar-bg">
                        <div class="gauge-fill" id="def-bar" style="width: 55%; background: linear-gradient(to right, #2f3542, #57606f);"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- ⚔️ 퀘스트 허브 (Action Grid) -->
        <section class="v-quest-hub">
            <h3 style="font-size: 1.1rem; font-weight: 900; color: var(--v-wood); margin-bottom: 20px;"><i class="fa-solid fa-map"></i> 오늘의 퀘스트</h3>
            <div class="v-btn-grid">
                <button class="v-action-btn" onclick="syncClubRecord()" style="border-color: var(--perf);">⚡ 클럽 동기화</button>
                <button class="v-action-btn" onclick="location.href='miracle.html?cat=visit'">📸 방문 인증</button>
                <button class="v-action-btn" onclick="location.href='miracle.html?cat=meal'">🍱 식단 인증</button>
                <button class="v-action-btn" onclick="triggerSuddenMission()" style="background: var(--v-paper);">✨ 보너스 퀘스트</button>
            </div>

            <!-- Water Hunter Slider -->
            <div style="background: var(--v-paper); padding: 20px; border-radius: 25px; border: 2px solid var(--v-border); margin-top: 20px;">
                <div style="display: flex; justify-content: space-between; font-weight: 900; font-size: 1rem; margin-bottom: 12px; color: var(--v-wood);">
                    <span>💧 워터 헌터 (수분 보충)</span>
                    <span id="water-val">1.2L / 2.0L</span>
                </div>
                <input type="range" style="width: 100%;" id="water-range" min="0" max="20" value="12">
            </div>
        </section>

        <!-- 🛡️ 습관 수호 (Habit Board) -->
        <section style="background: #fff; border-radius: 35px; padding: 25px; box-shadow: var(--shadow);">
            <h3 style="font-size: 1.1rem; font-weight: 900; color: var(--v-wood); margin-bottom: 20px;"><i class="fa-solid fa-check-double"></i> 습관 수호 (Habit Board)</h3>
            <div id="habit-list-container"></div>
        </section>

    </div>

    <!-- 🧭 PREMIUM FLOATING NAV BAR -->
    <nav class="v-nav">
        <a href="index.html" class="v-nav-item active"><i class="fa-solid fa-house-chimney"></i><span>광장</span></a>
        <a href="miracle.html" class="v-nav-item"><i class="fa-solid fa-feather-pointed"></i><span>기록소</span></a>
        <a href="community.html" class="v-nav-item"><i class="fa-solid fa-people-roof"></i><span>숙소</span></a>
        <a href="library.html" class="v-nav-item"><i class="fa-solid fa-book-sparkles"></i><span>창고</span></a>
        <a href="gate.html" class="v-nav-item"><i class="fa-solid fa-door-open"></i><span>게이트</span></a>
    </nav>

    <script src="dashboard.js"></script>
</body>
</html>
