<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>노형점핑 & 체온테라피 멤버스 포털</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="노형점핑">
  <link rel="apple-touch-icon" href="final-logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6b46c1;
      --secondary: #ed64a6;
      --accent: #4fd1c5;
      --bg-dark: #0f172a;
      --card-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Outfit', 'Noto Sans KR', sans-serif;
      background-color: var(--bg-dark);
      color: #ffffff;
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      background: radial-gradient(circle at 0% 0%, #1e1b4b 0%, #0f172a 50%, #1e1b4b 100%);
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(45deg, transparent 0%, rgba(107, 70, 193, 0.05) 50%, transparent 100%);
      pointer-events: none;
      z-index: -1;
    }

    .container {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      padding: 40px 24px;
      flex: 1;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeInDown 0.8s ease-out;
    }

    .logo-area {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(to right, #ffffff, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
      letter-spacing: -1px;
    }

    .welcome-msg {
      font-size: 1rem;
      color: #94a3b8;
      font-weight: 300;
    }

    /* 포털 그리드 (1+4 구조) */
    .portal-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .portal-card {
      position: relative;
      background: var(--card-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 24px 16px;
      text-align: center;
      text-decoration: none;
      color: white;
      backdrop-filter: blur(12px);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    /* 메인 카드 (Full Width) */
    .portal-card.main {
      grid-column: span 2;
      padding: 40px 20px;
      background: linear-gradient(135deg, rgba(107, 70, 193, 0.25), rgba(237, 100, 166, 0.15));
      border-color: rgba(107, 70, 193, 0.4);
      margin-bottom: 8px;
    }

    .portal-card:active { transform: scale(0.96); }
    .portal-card:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.3);
      transform: translateY(-5px);
    }

    main .portal-card .icon { display: none; } /* 이모티콘 제거 */

    .portal-card .eng-title {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 6px;
      color: #ffffff;
      text-transform: uppercase;
    }

    .portal-card.main .eng-title { 
      font-size: 1.6rem; 
      letter-spacing: 4px;
    }

    .portal-card .kor-title {
      font-size: 0.75rem;
      color: #94a3b8;
      font-weight: 300;
      letter-spacing: 0.5px;
    }

    .portal-card.main .kor-title { font-size: 0.9rem; color: #cbd5e1; }

    footer {
      padding: 20px 20px 40px; /* 좌우 여백 확보 */
      text-align: center;
      color: #94a3b8;
      font-size: 0.65rem; /* 더 안정적인 크기 */
      letter-spacing: 0; /* 자간 제거 */
      text-transform: uppercase;
      font-weight: 700;
      opacity: 0.3;
      line-height: 1.4;
    }

    /* 챌린지 카드 특별 스타일 */
    .portal-card.challenge {
      background: linear-gradient(135deg, rgba(107, 70, 193, 0.4), rgba(236, 201, 75, 0.2));
      border-color: rgba(236, 201, 75, 0.3);
      box-shadow: 0 15px 35px rgba(107, 70, 193, 0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo-area">NOHYUNG JUMPING</div>
      <div class="welcome-msg">PREMIUM MEMBERS PORTAL</div>
    </header>

    <main class="portal-grid">
      <!-- 1. THERAPY -->
      <a href="?page=reservation" class="portal-card main stagger-1">
        <span class="badge">RESERVE</span>
        <span class="eng-title">THERAPY</span>
        <span class="kor-title">힐링 테라피 예약</span>
      </a>

      <!-- 0. CHALLENGE (NOHYUNG WORLD) -->
      <a href="?page=challenge" class="portal-card main challenge stagger-1-5">
        <span class="eng-title" style="color:#ecc94b; text-shadow:0 0 10px rgba(236, 201, 75, 0.4);">NOHYUNG WORLD</span>
        <span class="kor-title" style="color:#ffffff; font-weight:700;">🏰 33 챌린지 & 게임 광장</span>
      </a>

      <!-- 2. TOP HEROES -->
      <a href="?page=halloffame" class="portal-card stagger-2">
        <span class="eng-title">TOP HEROES</span>
        <span class="kor-title">이달의 시상자 & 출석왕</span>
      </a>

      <!-- 3. MIRACLE -->
      <a href="?page=miracle" class="portal-card stagger-3">
        <span class="eng-title">MIRACLE</span>
        <span class="kor-title">오운완 & 식단 공유</span>
      </a>

      <!-- 4. INSIDE -->
      <a href="?page=notice" class="portal-card stagger-4">
        <span class="eng-title">INSIDE</span>
        <span class="kor-title">건강 꿀팁 & 공지</span>
      </a>

      <!-- 5. CONNECT -->
      <a href="?page=community" class="portal-card stagger-5">
        <span class="eng-title">CONNECT</span>
        <span class="kor-title">릴레이 칭찬 & 수다</span>
      </a>
    </main>

    <footer>
      <div>NOHYUNG JUMPING & THERAPY SINCE 2023</div>
    </footer>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('Service Worker registered', reg))
          .catch(err => console.log('Service Worker failed', err));
      });
    }
  </script>
</body>
</html>
