<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MIRACLE - 노형점핑</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #ed64a6;
      --bg-dark: #0f172a;
    }

    body {
      font-family: 'Outfit', 'Noto Sans KR', sans-serif;
      background-color: var(--bg-dark);
      color: white;
      margin: 0;
      padding: 0;
      background: linear-gradient(to bottom, #1e1b4b, #0f172a);
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      text-decoration: none;
      font-size: 0.9rem;
      opacity: 0.7;
    }

    .miracle-card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 24px;
      overflow: hidden;
      margin-bottom: 30px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .image-placeholder {
      width: 100%;
      height: 250px;
      background: linear-gradient(45deg, #312e81, #4c1d95);
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.3);
      font-size: 0.9rem;
    }

    .card-body {
      padding: 24px;
    }

    .tag {
      display: inline-block;
      padding: 4px 12px;
      background: var(--primary);
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .card-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .card-desc {
      font-size: 0.95rem;
      color: #94a3b8;
      line-height: 1.6;
    }

    .stats {
      display: flex;
      gap: 20px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .stat-item {
      text-align: center;
    }

    .stat-label {
      font-size: 0.7rem;
      color: #64748b;
      display: block;
    }

    .stat-val {
      font-size: 1.1rem;
      font-weight: 700;
      color: #f472b6;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="?page=index" class="back-btn">← 돌아가기</a>
    <header>
      <h1 style="font-size: 2.2rem; letter-spacing: 2px;">MIRACLE</h1>
      <p style="color: #94a3b8;">나를 바꾸는 놀라운 기적의 기록</p>
    </header>

    <div class="miracle-card">
      <div class="image-placeholder">기적의 주인공 사진이 준비 중입니다</div>
      <div class="card-body">
        <span class="tag">33챌린지 성공</span>
        <h2 class="card-title">체지방 -8kg 감량의 기적!</h2>
        <p class="card-desc">"처음엔 할 수 있을까 걱정했지만, 점핑의 에너지와 테라피의 편안함 덕분에 목표를 달성했어요. 제 인생이 바뀌었습니다!"</p>
        <div class="stats">
          <div class="stat-item">
            <span class="stat-label">체중 변화</span>
            <span class="stat-val">-10.2kg</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">체지방률</span>
            <span class="stat-val">-8.5%</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
