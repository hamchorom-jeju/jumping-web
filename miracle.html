<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ALTAR OF MIRACLES - GENIE WORLD</title>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* 탭 시스템 스타일 */
    .v-tabs {
      display: flex; gap: 10px; margin-bottom: 25px;
      background: var(--v-paper); padding: 8px; border-radius: 20px;
      border: 1px solid var(--v-border);
    }
    .v-tab-btn {
      flex: 1; padding: 12px; border: none; border-radius: 15px;
      font-weight: 900; font-size: 0.9rem; cursor: pointer;
      transition: all 0.3s; color: var(--text-main); background: transparent;
    }
    .v-tab-btn.active { 
      background: var(--v-wood) !important; 
      color: #fff !important; 
      box-shadow: 0 4px 10px rgba(93, 64, 55, 0.3); 
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; animation: slideUp 0.4s ease-out; }

    /* 📸 통합 인증 카드 */
    .premium-cert-card {
      background: #fff; border-radius: 25px; padding: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.03); border: 2px solid var(--v-paper);
      margin-bottom: 25px;
    }

    /* ⚔️ 퀘스트 항목 스타일 */
    .quest-item-box {
      background: var(--v-paper); border-radius: 18px; padding: 15px;
      display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
      border: 1px solid var(--v-border); cursor: pointer; transition: all 0.2s;
    }
    .quest-item-box:active { transform: scale(0.98); }
    .quest-item-icon { font-size: 1.5rem; width: 45px; height: 45px; background: #fff; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
    .quest-item-info { flex: 1; }
    .quest-item-info h4 { font-size: 0.95rem; font-weight: 900; color: var(--text-main); }
    .quest-item-info p { font-size: 0.75rem; color: var(--text-dim); font-weight: 700; opacity: 0.8; }
    .quest-pts { font-size: 0.85rem; font-weight: 900; color: var(--emerald); }

    /* 🍱 식단 인증 카드 스타일 (복구) */
    .meal-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .meal-slot {
      aspect-ratio: 1/1; background: #fff; border-radius: 20px;
      border: 2px dashed var(--v-border); display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 8px; cursor: pointer;
      transition: all 0.2s; position: relative; overflow: hidden;
    }
    .meal-slot:active { transform: scale(0.95); }
    .meal-slot.has-img { border-style: solid; border-color: var(--emerald); }
    .meal-slot .icon { font-size: 1.5rem; }
    .meal-slot .label { font-size: 0.7rem; font-weight: 800; color: var(--text-dim); }
    .meal-preview { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }

    /* 🖼️ Premium Frame Effect */
    .magic-frame {
      position: absolute; inset: 0; border: 3px solid var(--emerald);
      box-shadow: inset 0 0 10px rgba(46, 204, 113, 0.2); pointer-events: none;
      opacity: 0; transition: opacity 0.3s;
    }
    .meal-slot.has-img .magic-frame { opacity: 1; }

    /* 📱 GLOBAL VILLAGE NAV (Standardized v44.116) */
    .v-nav {
      position: fixed; bottom: 0; left: 0; width: 100%;
      background: #fff; display: flex; justify-content: space-around;
      padding: 12px 10px 35px; border-top: 2px solid var(--v-paper);
      z-index: 2000;
    }
    .v-nav-item {
      text-align: center; color: #94a3b8; text-decoration: none;
      font-size: 0.65rem; font-weight: 900; display: flex;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 4px; flex: 1;
    }
    .v-nav-item i { font-size: 1.6rem; }
    .v-nav-item img { width: 22px; height: 22px; border-radius: 4px; }
    .v-nav-item.active { color: var(--gold); }
    
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <header class="v-global-header">
      <h1>모험가의 기록소</h1>
  </header>

  <div class="container">
    
    <!-- 🗂️ 탭 네비게이션 -->
    <div class="v-tabs">
      <button class="v-tab-btn active" id="btn-quest" onclick="switchTab('quest')">퀘스트 인증 ⚔️</button>
      <button class="v-tab-btn" id="btn-habit" onclick="switchTab('habit')">습관 인증 🌿</button>
    </div>

    <!-- ⚔️ 퀘스트 인증 탭 -->
    <div id="tab-quest" class="tab-content active">
      
      <!-- ⚡ 실시간 돌발 계시 -->
      <div id="active-quests-container" style="display: none; background: #fff; border-radius: 20px; padding: 18px; margin-bottom: 25px; border: 2px solid #3498db;">
        <div style="font-size: 0.8rem; color: #3498db; font-weight: 900; margin-bottom: 12px;">⚡ 실시간 돌발 퀘스트 (15점)</div>
        <div id="active-quest-list" style="display: flex; flex-direction: column; gap: 10px;"></div>
      </div>

      <!-- 📸 퀘스트 사진 인증 (통합) -->
      <div class="premium-cert-card">
        <div class="section-title">⚔️ 퀘스트 인증하기</div>
        
        <div onclick="document.getElementById('file-input-quest').click()" style="width:100%; aspect-ratio:16/9; background:var(--v-paper); border:2px dashed var(--v-border); border-radius:20px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer;">
          <span style="font-size:2.5rem; margin-bottom:10px;">📸</span>
          <p style="font-size:0.85rem; color:var(--text-dim); font-weight:800;">퀘스트 인증 사진 촬영</p>
          <input type="file" id="file-input-quest" hidden accept="image/*" capture="camera" onchange="previewQuestImage(this)">
        </div>
        
        <div id="quest-preview-container" style="display: none; margin-top: 15px;">
          <img id="quest-image-preview" src="" style="width: 100%; border-radius: 20px; border: 2px solid var(--emerald);">
        </div>

        <select id="quest-select" style="width: 100%; margin-top: 15px; background: #fff; border: 2px solid var(--v-paper); padding: 15px; border-radius: 15px; font-weight: 800; font-size: 0.95rem; color: var(--text-main); outline: none;">
          <option value="방문">🏰 방문 인증 (15점)</option>
          <option value="오운완">🔥 오운완 (운동 완료) (15점)</option>
          <option value="수분">💧 수분 섭취 인증 (15점)</option>
          <optgroup label="⚡ 실시간 돌발 계시" id="surprise-optgroup">
            <!-- 돌발 퀘스트 동적 추가 -->
          </optgroup>
        </select>
        
        <button onclick="submitQuest()" style="width: 100%; margin-top: 15px; background: var(--emerald); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: 900; font-size: 1.1rem; box-shadow: 0 8px 20px rgba(46, 204, 113, 0.2);">퀘스트 기록 완료</button>
      </div>

      <!-- 🍱 식단 인증 (특수 그리드) -->
      <div class="cert-section">
        <div class="section-title">🍱 오늘의 식단 인증하기</div>
        <p style="font-size:0.75rem; color:var(--text-dim); margin-bottom:12px; font-weight:700;">모든 끼니 완수 시 30점의 축복이 하사됩니다.</p>
        <div class="meal-grid">
          <div class="meal-slot" id="meal-morning" onclick="uploadMeal('morning')">
            <span class="icon">🌅</span>
            <span class="label">아침</span>
            <div class="magic-frame"></div>
          </div>
          <div class="meal-slot" id="meal-noon" onclick="uploadMeal('noon')">
            <span class="icon">☀️</span>
            <span class="label">점심</span>
            <div class="magic-frame"></div>
          </div>
          <div class="meal-slot" id="meal-evening" onclick="uploadMeal('evening')">
            <span class="icon">🌙</span>
            <span class="label">저녁</span>
            <div class="magic-frame"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 🌿 습관 인증 탭 -->
    <div id="tab-habit" class="tab-content">
      
      <!-- 📸 습관 사진 인증 -->
      <div class="premium-cert-card">
        <div class="section-title">🌿 습관 & 플러스 인증</div>
        
        <div onclick="document.getElementById('file-input-habit').click()" style="width:100%; aspect-ratio:16/9; background:var(--v-paper); border:2px dashed var(--v-border); border-radius:20px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer;">
          <span style="font-size:2.5rem; margin-bottom:10px;">📜</span>
          <p style="font-size:0.85rem; color:var(--text-dim); font-weight:800;">습관 실천 인증 촬영</p>
          <input type="file" id="file-input-habit" hidden accept="image/*" capture="camera" onchange="previewHabitImage(this)">
        </div>

        <select id="habit-select" style="width: 100%; margin-top: 15px; background: #fff; border: 2px solid var(--v-paper); padding: 15px; border-radius: 15px; font-weight: 800; font-size: 0.95rem; color: var(--text-main); outline: none;">
          <optgroup label="🌱 9대 데일리 습관">
            <option value="모닝티">🍵 모닝 티 (따뜻한 물)</option>
            <option value="스트레칭">🧘 모닝 스트레칭</option>
            <option value="베지퍼스트">🥗 베지 퍼스트 (채소 먼저)</option>
            <option value="슬로우치잉">🦷 슬로우 치잉 (천천히 씹기)</option>
            <option value="7000보">🏃 세븐 사우전드 (7,000보)</option>
            <option value="계단">🪜 스테어 마법 (계단 이용)</option>
            <option value="나이트컷">📵 나이트 컷 (20시 금식)</option>
            <option value="굿슬립">💤 굿 슬립 (자정 전 취침)</option>
            <option value="셀프칭찬">💖 셀프 칭찬 (나를 위한 한마디)</option>
          </optgroup>
          <optgroup label="✨ 미라클 플러스 (추가 보너스)">
            <option value="새벽기상">☀️ 새벽 기상 인증</option>
            <option value="독서">📚 지혜의 탐구 (독서)</option>
            <option value="환경수호">🌍 환경 수호 (플로깅 등)</option>
            <option value="기타성취">🏆 기타 사소한 성취</option>
          </optgroup>
        </select>
        
        <button onclick="submitHabit()" style="width: 100%; margin-top: 15px; background: var(--v-wood); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: 900; font-size: 1.1rem; box-shadow: 0 8px 20px rgba(93, 64, 55, 0.2);">습관 기록 완료</button>
      </div>
    </div>
  </div>

  <!-- 📱 GLOBAL VILLAGE NAV (Standardized v44.116) -->
  <nav class="v-nav">
    <a href="index.html" class="v-nav-item">
      <i class="fas fa-home"></i>
      <span>광장</span>
    </a>
    <a href="miracle.html" class="v-nav-item active">
      <i class="fas fa-camera"></i>
      <span>아카이브</span>
    </a>
    <a href="oasis.html" class="v-nav-item">
      <i class="fas fa-water"></i>
      <span>오아시스</span>
    </a>
    <a href="wisdom.html" class="v-nav-item">
      <i class="fas fa-book"></i>
      <span>지식창고</span>
    </a>
    <a href="reservation.html" class="v-nav-item">
      <img src="therapy-icon.png" alt="테라피">
      <span>테라피(예약)</span>
    </a>
  </nav>

  <!-- 🏷️ VERSION STAMP (For Verification) -->
  <div style="text-align: center; font-size: 0.6rem; color: #cbd5e1; margin-top: 10px; font-weight: 700; padding-bottom: 120px;">
    v44.123 - UI Fix Applied
  </div>

  <script>
    const TARGET_PHONE = '<?= targetPhone ?>';
    const TARGET_NAME = '<?= targetName ?>';

    window.onload = function() {
      // 딥링크 체크
      const params = new URLSearchParams(window.location.search);
      const tab = params.get('tab');
      if (tab === 'habit') switchTab('habit');
      else switchTab('quest');

      loadActiveEvents();
    };

    function switchTab(type) {
      document.querySelectorAll('.v-tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
      
      if (type === 'quest') {
        document.getElementById('btn-quest').classList.add('active');
        document.getElementById('tab-quest').classList.add('active');
      } else {
        document.getElementById('btn-habit').classList.add('active');
        document.getElementById('tab-habit').classList.add('active');
      }
    }

    function loadActiveEvents() {
      google.script.run.withSuccessHandler(events => {
        if(events && events.length > 0) {
          const container = document.getElementById('active-quests-container');
          const list = document.getElementById('active-quest-list');
          const surpriseGroup = document.getElementById('surprise-optgroup');
          
          container.style.display = 'block';
          list.innerHTML = events.map(e => `
            <div style="background: var(--v-paper); padding: 12px; border-radius: 12px; font-size: 0.85rem; font-weight: 800; color: #3498db; border: 1px solid #d0e7f9;">
              ⚔️ 돌발: ${e.title} (15점)
            </div>
          `).join('');

          events.forEach(e => {
            const opt = document.createElement('option');
            opt.value = e.title;
            opt.innerText = `⚡ [돌발] ${e.title}`;
            surpriseGroup.appendChild(opt);
          });
        }
      }).getActiveEvents();
    }

    function previewQuestImage(input) {
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
          document.getElementById('quest-image-preview').src = e.target.result;
          document.getElementById('quest-preview-container').style.display = 'block';
        }
        reader.readAsDataURL(input.files[0]);
      }
    }

    function previewHabitImage(input) {
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
          document.getElementById('habit-image-preview'); // Placeholder for preview if needed
        }
        reader.readAsDataURL(input.files[0]);
      }
    }

    function uploadMeal(type) {
      const labels = { morning: '아침', noon: '점심', evening: '저녁' };
      alert(`${labels[type]} 식단 인증 카메라를 실행합니다. (준비 중)`);
    }

    function submitQuest() {
      const quest = document.getElementById('quest-select').value;
      const file = document.getElementById('file-input-quest').files[0];
      if(!file) return alert("인증할 사진을 선택하세요.");
      alert(`[퀘스트 기록] ${quest} 인증을 완료했습니다! (15점 획득)`);
    }

    function submitHabit() {
      const habit = document.getElementById('habit-select').value;
      alert(`[습관 기록] ${habit} 실천을 인증했습니다!`);
    }
  </script>
</body>
</html>
