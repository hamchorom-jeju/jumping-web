<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ALTAR OF MIRACLES - GENIE WORLD</title>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="bridge.js"></script>
  <style>
    :root {
      --v-wood: #5d4037;
      --v-paper: #f9f6f2;
      --v-border: #e0dacc;
      --emerald: #2ecc71;
      --gold: #d4af37;
      --text-main: #2c3e50;
      --text-dim: #7f8c8d;
    }
    
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { 
      font-family: 'Pretendard', sans-serif; background-color: var(--v-paper); 
      color: var(--text-main); margin: 0; padding: 0; line-height: 1.6;
    }

    .v-global-header {
      background: #fff; padding: 20px; text-align: center;
      border-bottom: 2px solid var(--v-border); position: sticky; top: 0; z-index: 1000;
    }
    .v-global-header h1 { font-size: 1.2rem; font-weight: 900; margin: 0; color: var(--v-wood); }

    .container { padding: 20px; padding-bottom: 120px; max-width: 500px; margin: 0 auto; }

    /* 탭 시스템 */
    .v-tabs { display: flex; gap: 10px; margin-bottom: 25px; background: #fff; padding: 8px; border-radius: 20px; border: 1px solid var(--v-border); }
    .v-tab-btn { flex: 1; padding: 12px; border: none; border-radius: 15px; font-weight: 900; font-size: 0.9rem; cursor: pointer; transition: all 0.3s; color: var(--text-main); background: transparent; }
    .v-tab-btn.active { background: var(--v-wood) !important; color: #fff !important; box-shadow: 0 4px 10px rgba(93, 64, 55, 0.3); }

    .tab-content { display: none; }
    .tab-content.active { display: block; animation: slideUp 0.4s ease-out; }

    /* 인증 카드 */
    .premium-cert-card { background: #fff; border-radius: 25px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.03); border: 1px solid var(--v-border); margin-bottom: 25px; }
    .section-title { font-size: 1rem; font-weight: 900; margin-bottom: 15px; color: var(--v-wood); display: flex; align-items: center; gap: 8px; }

    /* 식단 그리드 */
    .meal-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .meal-slot {
      aspect-ratio: 1/1; background: var(--v-paper); border-radius: 20px;
      border: 2px dashed var(--v-border); display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 8px; cursor: pointer;
      position: relative; overflow: hidden;
    }
    .meal-slot .icon { font-size: 1.5rem; }
    .meal-slot .label { font-size: 0.7rem; font-weight: 800; color: var(--text-dim); }

    /* 코멘트 입력 */
    .comment-input {
      width: 100%; padding: 15px; border: 2px solid var(--v-paper);
      border-radius: 15px; margin-top: 12px; font-size: 0.9rem;
      font-weight: 700; color: var(--text-main); outline: none;
      background: #fff; box-sizing: border-box;
    }

    /* 실시간 피드 */
    .feed-section { margin-top: 40px; }
    .feed-card { background: #fff; border-radius: 25px; overflow: hidden; margin-bottom: 25px; border: 1px solid var(--v-border); box-shadow: 0 5px 15px rgba(0,0,0,0.02); }
    .feed-header { padding: 15px; display: flex; align-items: center; gap: 10px; }
    .feed-avatar { width: 40px; height: 40px; background: var(--v-paper); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; color: var(--v-wood); }
    .feed-user-info { flex: 1; }
    .feed-user-name { font-size: 0.9rem; font-weight: 900; }
    .feed-time { font-size: 0.7rem; color: #94a3b8; }
    .feed-badge { background: var(--emerald); color: white; padding: 4px 10px; border-radius: 8px; font-size: 0.65rem; font-weight: 800; }
    .feed-img-box { width: 100%; aspect-ratio: 4/3; background: #f8fafc; overflow: hidden; }
    .feed-img { width: 100%; height: 100%; object-fit: cover; }
    .feed-content { padding: 18px; }
    .feed-text { font-size: 0.9rem; font-weight: 700; color: var(--text-dim); }

    .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--emerald); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; display: none; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* 하단 네비게이션 */
    .v-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; display: flex; padding: 12px 10px 35px; border-top: 2px solid var(--v-border); z-index: 2000; }
    .v-nav-item { text-align: center; color: #94a3b8; text-decoration: none; font-size: 0.65rem; font-weight: 900; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .v-nav-item i { font-size: 1.6rem; }
    .v-nav-item img { width: 22px !important; height: 22px !important; object-fit: contain; }
    .v-nav-item.active { color: var(--gold); }

    /* [v44.190] 프로필 바 및 로그아웃 버튼 스타일 */
    .v-profile-bar {
      background: var(--v-paper);
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--v-border);
      animation: slideUp 0.5s ease-out;
    }
    .v-status-badge {
      display: flex;
      align-items: center;
      font-size: 0.85rem;
      font-weight: 800;
      color: var(--v-wood);
    }
    .v-status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--emerald);
      margin-right: 8px;
      box-shadow: 0 0 10px var(--emerald);
    }
    .v-status-dot.offline {
      background: var(--text-dim);
      box-shadow: none;
    }
    .v-logout-btn {
      background: rgba(93, 64, 55, 0.05); border: 1px solid var(--v-border);
      color: var(--v-wood); width: 36px; height: 36px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s;
    }
    .v-logout-btn:active { transform: scale(0.9); background: rgba(93, 64, 55, 0.1); }

    /* [v44.193] 로딩 오버레이 스타일 */
    .v-loading-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(5px);
      display: none; flex-direction: column; align-items: center; justify-content: center;
      z-index: 10000; animation: fadeIn 0.3s;
    }
    .v-loading-spinner {
      width: 50px; height: 50px; border: 5px solid var(--v-paper);
      border-top: 5px solid var(--gold); border-radius: 50%;
      animation: spin 1s linear infinite; margin-bottom: 15px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* 폴라로이드 갤러리 (12구) */
    .polaroid-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px 12px; padding: 15px 10px; margin-top: 15px; }
    .polaroid-card { 
      background: #fdfbf7; 
      padding: 8px 8px 22px 8px; 
      box-shadow: 2px 4px 10px rgba(0,0,0,0.1), inset 0 0 4px rgba(255,255,255,0.8); 
      border-radius: 3px;
      border: 1px solid rgba(0,0,0,0.03);
      position: relative; 
      cursor: pointer; 
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1); 
    }
    .polaroid-card:hover { transform: scale(1.08) rotate(0deg) !important; z-index: 10; box-shadow: 4px 10px 20px rgba(0,0,0,0.15); }
    .polaroid-img-wrapper { 
      width: 100%; aspect-ratio: 1/1; overflow: hidden; background: #e0e0e0; 
      border-radius: 2px;
      box-shadow: inset 0 0 5px rgba(0,0,0,0.1);
    }
    .polaroid-img { 
      width: 100%; height: 100%; object-fit: cover; 
      filter: contrast(1.03) sepia(0.05); /* 약간의 아날로그 필름 느낌 */
    }
    .polaroid-author { font-family: 'Pretendard', sans-serif; font-weight: 800; font-size: 0.7rem; color: var(--text-main); text-align: center; margin-top: 12px; letter-spacing: -0.3px; }
    .polaroid-badge { position: absolute; top: -10px; left: -10px; background: var(--gold); color: #fff; border-radius: 50%; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; box-shadow: 0 3px 6px rgba(0,0,0,0.15); z-index: 2; border: 2px solid #fff; }
    
    /* 페이징 */
    .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 25px; padding-bottom: 20px; }
    .page-btn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--v-border); background: #fff; color: var(--text-dim); font-weight: 800; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
    .page-btn.active { background: var(--v-wood); color: #fff; border-color: var(--v-wood); box-shadow: 0 2px 8px rgba(93, 64, 55, 0.3); }
    .page-btn:active { transform: scale(0.9); }

    /* 모달 뷰어 & 리액션 */
    .polaroid-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 3000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
    .polaroid-modal-content { background: #fff; padding: 15px 15px 25px 15px; border-radius: 5px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }
    .modal-close-btn { position: absolute; top: -40px; right: 0; color: white; font-size: 2rem; cursor: pointer; font-weight: 900; background: none; border: none; outline: none; }
    .modal-img { width: 100%; border-radius: 3px; margin-bottom: 15px; }
    .modal-text { font-size: 0.95rem; font-weight: 800; color: var(--text-main); margin-bottom: 5px; }
    .modal-meta { font-size: 0.75rem; color: var(--text-dim); display: flex; justify-content: space-between; font-weight: 700; }
    .reaction-bar { display: flex; gap: 8px; margin-top: 15px; border-top: 1px dashed var(--v-border); padding-top: 15px; }
    .reaction-btn { flex: 1; padding: 8px; background: var(--v-paper); border: 1px solid var(--v-border); border-radius: 12px; font-size: 0.8rem; font-weight: 800; color: var(--text-main); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: all 0.2s; }
    .reaction-btn:active { transform: scale(0.95); }
    .reaction-btn.active { background: var(--emerald); color: white; border-color: var(--emerald); box-shadow: 0 2px 8px rgba(46, 204, 113, 0.3); }

    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <header class="v-global-header">
    <div style="display:flex; justify-content:space-between; align-items:center; width:100%; max-width:500px; margin:0 auto;">
      <div style="width:40px;"></div>
      <h1 style="font-size:1.2rem; font-weight:900;">⚔️ 모험가의 기록소</h1>
      <button class="v-logout-btn" id="header-logout-btn" onclick="Auth.logout()" title="마을 퇴장">
        <i class="fas fa-sign-out-alt"></i>
      </button>
    </div>
  </header>

  <div class="v-profile-bar">
    <div class="v-status-badge" id="user-status-badge">
      <div class="v-status-dot" id="user-status-dot"></div>
      <span id="user-status-name">정보 로딩 중...</span>
    </div>
    <div style="font-size: 0.7rem; color: var(--text-dim); font-weight: 700;" id="user-status-phone">
      NO SESSION
    </div>
  </div>

  <!-- [v44.193] 로딩 오버레이 -->
  <div id="v-loading" class="v-loading-overlay">
    <div class="v-loading-spinner"></div>
    <div id="v-loading-msg" style="font-weight: 800; color: var(--v-wood); font-size: 0.9rem;">마을의 기록을 동기화 중...</div>
  </div>

  <div class="container">
    <div class="v-tabs">
      <button class="v-tab-btn active" id="btn-quest" onclick="switchTab('quest')">퀘스트 인증 ⚔️</button>
      <button class="v-tab-btn" id="btn-habit" onclick="switchTab('habit')">습관 인증 🌿</button>
    </div>

    <!-- 퀘스트 탭 -->
    <div id="tab-quest" class="tab-content active">
      <div class="premium-cert-card">
        <div class="section-title">⚔️ 퀘스트 인증하기 (15점)</div>
        
        <div id="quest-upload-placeholder" onclick="document.getElementById('file-input-quest').click()" style="width:100%; aspect-ratio:16/9; background:var(--v-paper); border:2px dashed var(--v-border); border-radius:20px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer;">
          <span style="font-size:2.5rem; margin-bottom:10px;">📸</span>
          <p style="font-size:0.85rem; color:var(--text-dim); font-weight:800;">퀘스트 인증 사진 촬영</p>
        </div>
        
        <div id="quest-preview-box" style="display: none; margin-top: 5px;">
          <div style="position: relative;">
            <img id="quest-preview-img" src="" style="width: 100%; border-radius: 20px; border: 2px solid var(--emerald); display: block;">
            <div onclick="resetPreview('quest')" style="position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.6); color: white; padding: 8px 15px; border-radius: 10px; font-size: 0.75rem; font-weight: 800; backdrop-filter: blur(5px); cursor:pointer;">다시 촬영</div>
          </div>
        </div>
        
        <input type="file" id="file-input-quest" hidden accept="image/*" capture="camera" onchange="previewImage('quest', this)">

        <select id="quest-select" style="width: 100%; margin-top: 15px; background: #fff; border: 2px solid var(--v-paper); padding: 15px; border-radius: 15px; font-weight: 800; outline: none; color: var(--text-main);">
          <option value="방문">🏰 방문 인증</option>
          <option value="오운완">🔥 오운완 (운동 완료)</option>
          <option value="수분">💧 수분 섭취 인증</option>
          <option value="돌발퀘스트">⚡ 돌발 퀘스트</option>
        </select>
        <input type="text" id="quest-comment" class="comment-input" placeholder="오늘의 소감을 한마디 남겨주세요!">
        <button id="btn-submit-quest" onclick="submitEntry('quest')" style="width: 100%; margin-top: 15px; background: var(--emerald); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: 900; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.2);">퀘스트 기록 완료</button>
      </div>

      <div class="cert-section">
        <div class="section-title">🍱 오늘의 식단 인증하기</div>
        <div class="meal-grid">
          <div class="meal-slot" id="meal-morning" onclick="quickMeal('아침 식단')">
            <span class="icon">🌅</span><span class="label">아침</span>
          </div>
          <div class="meal-slot" id="meal-noon" onclick="quickMeal('점심 식단')">
            <span class="icon">☀️</span><span class="label">점심</span>
          </div>
          <div class="meal-slot" id="meal-evening" onclick="quickMeal('저녁 식단')">
            <span class="icon">🌙</span><span class="label">저녁</span>
          </div>
        </div>
      </div>
    </div>

    <!-- 습관 탭 -->
    <div id="tab-habit" class="tab-content">
      <div class="premium-cert-card">
        <div class="section-title">🌿 습관 & 플러스 인증 (5점)</div>
        
        <div id="habit-upload-placeholder" onclick="document.getElementById('file-input-habit').click()" style="width:100%; aspect-ratio:16/9; background:var(--v-paper); border:2px dashed var(--v-border); border-radius:20px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer;">
          <span style="font-size:2.5rem; margin-bottom:10px;">📜</span>
          <p style="font-size:0.85rem; color:var(--text-dim); font-weight:800;">습관 실천 인증 촬영</p>
        </div>
        
        <div id="habit-preview-box" style="display: none; margin-top: 5px;">
          <div style="position: relative;">
            <img id="habit-preview-img" src="" style="width: 100%; border-radius: 20px; border: 2px solid var(--v-wood); display: block;">
            <div onclick="resetPreview('habit')" style="position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.6); color: white; padding: 8px 15px; border-radius: 10px; font-size: 0.75rem; font-weight: 800; backdrop-filter: blur(5px); cursor:pointer;">다시 촬영</div>
          </div>
        </div>
        
        <input type="file" id="file-input-habit" hidden accept="image/*" capture="camera" onchange="previewImage('habit', this)">

        <select id="habit-select" style="width: 100%; margin-top: 15px; background: #fff; border: 2px solid var(--v-paper); padding: 15px; border-radius: 15px; font-weight: 800; outline: none; color: var(--text-main);">
          <optgroup label="🌱 9대 데일리 습관">
            <option value="모닝티">🍵 모닝 티 (따뜻한 물)</option>
            <option value="모닝스트레칭">🧘 모닝 스트레칭</option>
            <option value="베지퍼스트">🥗 베지 퍼스트 (채소 먼저)</option>
            <option value="7000보달성">🏃 7,000보 달성</option>
            <option value="스테어마법">🪜 스테어 마법 (계단 이용)</option>
          </optgroup>
          <optgroup label="✨ 미라클 플러스 (하루 1개 제한)">
            <option value="새벽기상">☀️ 새벽 기상</option>
            <option value="독서인증">📚 독서 인증</option>
            <option value="환경사랑">🌍 환경 사랑 (플로깅 등)</option>
            <option value="기타">🏆 기타 사소한 성취</option>
          </optgroup>
        </select>
        <input type="text" id="habit-comment" class="comment-input" placeholder="실천 소감을 남겨주세요!">
        <button id="btn-submit-habit" onclick="submitEntry('habit')" style="width: 100%; margin-top: 15px; background: var(--v-wood); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: 900; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(93, 64, 55, 0.2);">습관 기록 완료</button>
      </div>
    </div>

    <!-- 피드 -->
    <section class="feed-section">
      <div class="section-title">✨ 마을의 기적 갤러리</div>
      <div id="feed-loader" class="loader"></div>
      <div id="archive-feed"></div>
      <div class="pagination" id="feed-pagination"></div>
    </section>
  </div>

  <!-- 폴라로이드 상세 모달 -->
  <div id="polaroid-modal" class="polaroid-modal">
    <div class="polaroid-modal-content">
      <button class="modal-close-btn" onclick="closeModal()"><i class="fas fa-times"></i></button>
      <img id="modal-img" src="" class="modal-img">
      <div class="modal-text" id="modal-text"></div>
      <div class="modal-meta">
        <span id="modal-author"></span>
        <span id="modal-time"></span>
      </div>
      <div class="reaction-bar">
        <button class="reaction-btn" id="btn-react-cool" onclick="toggleReaction('cool')"><span>멋져요 😎</span><span id="cnt-cool">0</span></button>
        <button class="reaction-btn" id="btn-react-best" onclick="toggleReaction('best')"><span>최고 👍</span><span id="cnt-best">0</span></button>
        <button class="reaction-btn" id="btn-react-cheer" onclick="toggleReaction('cheer')"><span>화이팅 🔥</span><span id="cnt-cheer">0</span></button>
      </div>
    </div>
  </div>

  <nav class="v-nav">
    <a href="index.html" class="v-nav-item"><i class="fas fa-home"></i><span>광장</span></a>
    <a href="miracle.html" class="v-nav-item active"><i class="fas fa-camera"></i><span>아카이브</span></a>
    <a href="oasis.html" class="v-nav-item"><i class="fas fa-water"></i><span>오아시스</span></a>
    <a href="wisdom.html" class="v-nav-item"><i class="fas fa-book"></i><span>지식창고</span></a>
    <a href="reservation.html" class="v-nav-item"><img src="therapy-icon.png" alt="테라피"><span>테라피(예약)</span></a>
  </nav>

  <script>
    // [v44.188] 1순위: URL 파라미터 확인
    const urlParams = new URLSearchParams(window.location.search);
    let TARGET_PHONE = (urlParams.get('phone') || '').trim();
    let TARGET_NAME = (urlParams.get('name') || '').trim();
    
    // [v44.188] 2순위: localStorage 세션 복구 (URL에 정보가 없을 때)
    if (!TARGET_PHONE) TARGET_PHONE = (localStorage.getItem('v44_user_phone') || '').trim();
    if (!TARGET_NAME) TARGET_NAME = (localStorage.getItem('v44_user_name') || '').trim();

    // Vercel/외부 환경 대응: 구글 템플릿 태그 무시 및 최종 검증
    if (TARGET_PHONE.indexOf('<?=') > -1) TARGET_PHONE = '';
    if (TARGET_NAME.indexOf('<?=') > -1) TARGET_NAME = '';

    window.onload = function() {
      // [v44.193] 최우선 순위: localStorage에서 신원 강제 복구
      TARGET_PHONE = (localStorage.getItem('v44_user_phone') || '').trim();
      TARGET_NAME = (localStorage.getItem('v44_user_name') || '').trim();

      // [v44.183] 글로벌 인증 결계 가동
      Auth.check();
      
      // [v44.190] 로그인 상태 UI 업데이트 (복구된 데이터로)
      renderLoginStatus();
      
      const tab = urlParams.get('tab') === 'habit' ? 'habit' : 'quest';
      switchTab(tab);
      loadArchiveFeed();
      loadActiveEvents();
    };

    /**
     * [v44.193] 로딩 표시 제어
     */
    function showLoading(msg) {
      const overlay = document.getElementById('v-loading');
      const msgEl = document.getElementById('v-loading-msg');
      if (overlay && msgEl) {
        msgEl.innerText = msg || "기록을 전송하고 있습니다...";
        overlay.style.display = 'flex';
      }
    }
    function hideLoading() {
      const overlay = document.getElementById('v-loading');
      if (overlay) overlay.style.display = 'none';
    }

    /**
     * [v44.190] 로그인 상태를 시각적으로 렌더링합니다.
     */
    function renderLoginStatus() {
      const nameEl = document.getElementById('user-status-name');
      const phoneEl = document.getElementById('user-status-phone');
      const dotEl = document.getElementById('user-status-dot');
      const logoutBtn = document.getElementById('header-logout-btn');
      const badge = document.getElementById('user-status-badge');
      const dot = document.getElementById('user-status-dot');
      
      const uName = localStorage.getItem('v44_user_name');
      const uPhone = localStorage.getItem('v44_user_phone');

      if (uName && uPhone) {
        TARGET_PHONE = uPhone;
        badge.style.background = "var(--emerald)";
        badge.style.color = "white";
        dot.style.background = "#fff";
        nameEl.innerText = `${uName}(${uPhone.slice(-4)}) 님 접속중!`;
        const uTier = localStorage.getItem('v44_user_tier') || "🌱 회원";
        phoneEl.innerText = uTier;
        logoutBtn.style.display = "flex"; // 로그인 안된 경우 퇴장 버튼 숨김
      } else {
        nameEl.innerText = "로그인이 필요합니다";
        nameEl.style.color = "var(--v-wood)";
        phoneEl.innerText = "SESSION REQUIRED";
        dotEl.classList.add('offline');
        logoutBtn.style.display = 'none'; // 로그인 안된 경우 퇴장 버튼 숨김
      }
    }

    function switchTab(type) {
      document.querySelectorAll('.v-tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
      document.getElementById('btn-' + type).classList.add('active');
      document.getElementById('tab-' + type).classList.add('active');
    }

    function previewImage(type, input) {
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = e => {
          document.getElementById(type + '-preview-img').src = e.target.result;
          document.getElementById(type + '-preview-box').style.display = 'block';
          const placeholder = document.getElementById(type + '-upload-placeholder');
          if (placeholder) placeholder.style.display = 'none';
          
          // [v44.194] 식단 인증 시 아래 버튼 섹션 숨김 유지
          if (type === 'quest' && document.getElementById('quest-select').value === '식단') {
            const certSec = document.querySelector('.cert-section');
            if (certSec) certSec.style.display = 'none';
          }
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    function resetPreview(type) {
      document.getElementById(type + '-preview-box').style.display = 'none';
      document.getElementById(type + '-upload-placeholder').style.display = 'flex';
      document.getElementById('file-input-' + type).value = "";
      
      // [v44.194] 숨겼던 식단 섹션 다시 표시
      const certSec = document.querySelector('.cert-section');
      if (certSec) certSec.style.display = 'block';
    }

    function quickMeal(mealType) {
      const mealCategory = "식단";
      const commentField = document.getElementById('quest-comment');
      const selectField = document.getElementById('quest-select');
      
      // [v44.194] 식단 섹션 숨김 (집중도 향상)
      const certSec = document.querySelector('.cert-section');
      if (certSec) certSec.style.display = 'none';

      if (!Array.from(selectField.options).some(opt => opt.value === mealCategory)) {
        const opt = document.createElement('option');
        opt.value = mealCategory;
        opt.innerText = "🍱 식단 인증";
        opt.hidden = true;
        selectField.appendChild(opt);
      }
      selectField.value = mealCategory;
      commentField.value = `[${mealType}] 인증합니다! `;
      document.getElementById('file-input-quest').click();
    }

    let currentPage = 1;

    function loadArchiveFeed(page = 1) {
      currentPage = page;
      const loader = document.getElementById('feed-loader');
      const feed = document.getElementById('archive-feed');
      const pagination = document.getElementById('feed-pagination');
      if (!loader || !feed) return;
      
      feed.innerHTML = '';
      if (pagination) pagination.innerHTML = '';
      loader.style.display = 'block';
      
      google.script.run
        .withSuccessHandler(res => {
          loader.style.display = 'none';
          try {
            if (res.error) {
              feed.innerHTML = `<p style="text-align:center; color:#e74c3c; font-size:0.8rem;">${res.error}</p>`;
              return;
            }
            
            const data = res.items || [];
            if (data.length === 0) {
              feed.innerHTML = '<p style="text-align:center; color:#94a3b8; font-size:0.8rem; margin-top:20px;">기록이 없습니다!</p>';
              return;
            }
            window.archiveData = data; // 모달용 데이터 저장
            
            let html = '<div class="polaroid-grid">';
            data.forEach((item, index) => {
              const photoId = (item.photoId || "").trim();
              const photoUrl = photoId ? `https://lh3.googleusercontent.com/d/${photoId}` : 'https://via.placeholder.com/150?text=No+Photo';
              
              let icon = "✨";
              if (item.type.includes("식단")) icon = "🍱";
              else if (item.type.includes("퀘스트")) icon = "⚔️";
              else if (item.type.includes("습관")) icon = "🌿";
              
              const rotation = Math.floor(Math.random() * 11) - 5; // -5도 ~ 5도 랜덤 회전
              
              html += `
                <div class="polaroid-card" style="transform: rotate(${rotation}deg);" onclick="openModal(${index})">
                  <div class="polaroid-badge">${icon}</div>
                  <div class="polaroid-img-wrapper">
                    <img src="${photoUrl}" class="polaroid-img" loading="lazy" alt="썸네일">
                  </div>
                  <div class="polaroid-author">${item.name || '모험가'}</div>
                </div>
              `;
            });
            html += '</div>';
            feed.innerHTML = html;
            
            renderPagination(res.totalPages, res.currentPage);
          } catch (err) {
            feed.innerHTML = `<p style="text-align:center; color:#e74c3c; font-size:0.8rem;">렌더링 오류</p>`;
          }
        })
        .withFailureHandler(err => {
          loader.style.display = 'none';
          feed.innerHTML = `<p style="text-align:center; color:#e74c3c; font-size:0.8rem;">서버 통신 실패</p>`;
        })
        .getArchiveFeed(page);
    }

    function renderPagination(totalPages, current) {
      const pagination = document.getElementById('feed-pagination');
      if (!pagination || totalPages <= 1) return;
      
      let html = '';
      
      if (current > 1) {
        html += `<button class="page-btn" onclick="loadArchiveFeed(${current - 1})"><i class="fas fa-chevron-left"></i></button>`;
      }
      
      let startPage = Math.max(1, current - 2);
      let endPage = Math.min(totalPages, startPage + 4);
      if (endPage - startPage < 4) startPage = Math.max(1, endPage - 4);
      
      for (let i = startPage; i <= endPage; i++) {
        const activeCls = i === current ? 'active' : '';
        html += `<button class="page-btn ${activeCls}" onclick="loadArchiveFeed(${i})">${i}</button>`;
      }
      
      if (current < totalPages) {
        html += `<button class="page-btn" onclick="loadArchiveFeed(${current + 1})"><i class="fas fa-chevron-right"></i></button>`;
      }
      
      pagination.innerHTML = html;
    }

    let currentModalIndex = -1;

    function openModal(index) {
      const item = window.archiveData[index];
      if (!item) return;
      currentModalIndex = index;
      
      const photoId = (item.photoId || "").trim();
      const photoUrl = photoId ? `https://lh3.googleusercontent.com/d/${photoId}` : '';
      
      document.getElementById('modal-img').src = photoUrl;
      document.getElementById('modal-text').innerText = `[${item.item}] ${item.comment || '멋진 모험가입니다!'}`;
      document.getElementById('modal-author').innerText = item.name;
      document.getElementById('modal-time').innerText = `${item.date} ${item.time}`;
      
      const reactions = item.reactions || { cool: [], best: [], cheer: [] };
      updateReactionBtn('cool', '멋져요 😎', reactions.cool || []);
      updateReactionBtn('best', '최고 👍', reactions.best || []);
      updateReactionBtn('cheer', '화이팅 🔥', reactions.cheer || []);
      
      document.getElementById('polaroid-modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('polaroid-modal').style.display = 'none';
    }

    function updateReactionBtn(type, label, list) {
      const btn = document.getElementById(`btn-react-${type}`);
      const cntLabel = document.getElementById(`cnt-${type}`);
      const count = list.length;
      const myPhone = (TARGET_PHONE || '').replace(/[^0-9]/g, "");
      const iClicked = myPhone && list.includes(myPhone);
      
      cntLabel.innerText = count;
      if (iClicked) btn.classList.add('active');
      else btn.classList.remove('active');
    }

    function toggleReaction(reactionType) {
      if (!TARGET_PHONE) return alert("로그인이 필요합니다.");
      const myPhone = TARGET_PHONE.replace(/[^0-9]/g, "");
      if (!myPhone) return alert("세션 정보가 올바르지 않습니다.");
      
      const item = window.archiveData[currentModalIndex];
      if (!item || !item.rowIdx) return;
      
      if (!item.reactions) item.reactions = { cool: [], best: [], cheer: [] };
      const list = item.reactions[reactionType] || [];
      const idx = list.indexOf(myPhone);
      
      if (idx > -1) list.splice(idx, 1);
      else list.push(myPhone);
      
      item.reactions[reactionType] = list;
      updateReactionBtn(reactionType, getReactionLabel(reactionType), list);
      
      google.script.run.updateReaction(item.rowIdx, reactionType, myPhone);
    }

    function getReactionLabel(type) {
      if (type === 'cool') return '멋져요 😎';
      if (type === 'best') return '최고 👍';
      if (type === 'cheer') return '화이팅 🔥';
      return '';
    }

    function submitEntry(type) {
      const btn = document.getElementById('btn-submit-' + type);
      const item = document.getElementById(type + '-select').value;
      const comment = document.getElementById(type + '-comment').value;
      const fileInput = document.getElementById('file-input-' + type);
      const file = fileInput.files[0];
      if (!file) return alert("인증 사진을 촬영해 주세요!");
      
      btn.disabled = true;
      btn.innerText = "사진 압축 및 전송 중...";

      let finalType = type === 'quest' ? '퀘스트' : '습관';
      let score = type === 'quest' ? 15 : 5;
      if (item === '식단' || item.includes('식단')) { finalType = '식단'; score = 10; }

      // 📉 사진 압축 엔진 (최대 800px)
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let width = img.width;
          let height = img.height;
          const max_size = 800;

          if (width > height) {
            if (width > max_size) { height *= max_size / width; width = max_size; }
          } else {
            if (height > max_size) { width *= max_size / height; height = max_size; }
          }
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          
          const compressedBase64 = canvas.toDataURL('image/jpeg', 0.8);
          
          const payload = {
            name: TARGET_NAME, phone: TARGET_PHONE, type: finalType,
            item: item, comment: comment, image: compressedBase64, score: score
          };

          // [v44.196] 전송 전 데이터 무결성 검사
          console.log("[v44.196] 전송 시도 - 이미지 길이:", compressedBase64 ? compressedBase64.length : 0);
          if (!compressedBase64 || compressedBase64.length < 100) {
            hideLoading();
            btn.disabled = false;
            return alert("🚨 사진 데이터가 생성되지 않았습니다. 다시 촬영해 주세요.");
          }

          // [v44.193] 로딩 시작 및 google.script.run 명시
          showLoading("⚔️ 퀘스트를 전송하고 있습니다...");
          google.script.run
            .withSuccessHandler(res => {
              hideLoading();
              btn.disabled = false;
              btn.innerText = type === 'quest' ? "퀘스트 기록 완료" : "습관 기록 완료";
              if (res && res.success) {
                const sVer = res.serverVersion || "old";
                const imgLenInfo = res.receivedImageLen !== undefined ? `\n(수신: ${res.receivedImageLen.toLocaleString()}자)` : "";
                const debugInfo = res.debugInfo ? ` / 상태: ${res.debugInfo}` : "";
                const photoIdInfo = res.photoId ? `\n[사진 ID: ${res.photoId.substring(0,10)}...]` : "";
                
                if (res.warning) {
                  // [v44.194] 권한 문제에 대한 상세 가이드 포함
                  alert(`⚠️ [${sVer}] 기록은 되었으나 사진 저장에 실패했습니다.${imgLenInfo}${debugInfo}\n\n원인: ${res.warning}\n\n💡 해결방법: 구글 스크립트 에디터에서 [배포] -> [새 배포]를 통해 권한 승인을 다시 완료해 주세요! (Vercel 연동 시 필수)`);
                } else {
                  alert(`✅ [${sVer}] 인증 성공!${imgLenInfo}${debugInfo}${photoIdInfo}\n[${finalType}] +${score}점이 적립되었습니다.`);
                }
                document.getElementById(type + '-comment').value = "";
                document.getElementById(type + '-preview-box').style.display = 'none';
                document.getElementById(type + '-upload-placeholder').style.display = 'flex';
                fileInput.value = "";
                
                // [v44.194] 숨겼던 식단 섹션 복구
                const certSec = document.querySelector('.cert-section');
                if (certSec) certSec.style.display = 'block';

                loadArchiveFeed();
              } else { 
                const errMsg = res ? res.error : "서버 응답 없음";
                if (errMsg.indexOf("Permission") > -1) {
                  alert(`🚨 권한 오류 발생!\n\n${errMsg}\n\n💡 해결방법: 구글 스크립트 에디터에서 [새 배포]를 눌러 '액세스 권한' 승인을 다시 확인해 주세요.`);
                } else {
                  alert("🚨 저장 실패: " + errMsg);
                }
              }
            })
            .withFailureHandler(err => {
              hideLoading();
              btn.disabled = false;
              btn.innerText = "기록 완료";
              alert("🚨 서버 통신 오류 (용량이 너무 크거나 네트워크 불안정)");
            })
            .submitArchive(payload);
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    function loadActiveEvents() {
      const select = document.getElementById('quest-select');
      google.script.run
        .withSuccessHandler(events => {
          if(events && events.length > 0) {
            const divider = document.createElement('option');
            divider.innerText = "──────────────";
            divider.disabled = true;
            select.appendChild(divider);
            events.forEach(e => {
              const opt = document.createElement('option');
              opt.value = e.title;
              opt.innerText = `⚡ [돌발] ${e.title}`;
              opt.style.color = "#e67e22";
              opt.style.fontWeight = "900";
              select.appendChild(opt);
            });
          }
        })
        .withFailureHandler(() => {})
        .getActiveEvents();
    }
  </script>
</body>
</html>
