<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>노형점핑 테라피 예약</title>
  <link rel="manifest" href="manifest-therapy.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="점핑테라피">
  <link rel="apple-touch-icon" href="therapy-icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6b46c1; /* 고급스러운 보라색 톤으로 변경 */
      --primary-light: #9f7aea;
      --secondary: #4a90e2;
      --bg-light: #f8fafc;
      --white: #ffffff;
      --text-main: #1a202c;
      --text-sub: #718096;
      --danger: #e53e3e;
      --success: #38a169;
      --shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      --glass: rgba(255, 255, 255, 0.8);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
    
    body { 
      background-color: var(--bg-light); 
      background-image: radial-gradient(circle at top right, rgba(107, 70, 193, 0.05), transparent),
                        radial-gradient(circle at bottom left, rgba(74, 144, 226, 0.05), transparent);
      color: var(--text-main); 
      padding: 30px; 
      max-width: 700px; /* 태블릿 맞춤 너비 */
      margin: 0 auto; 
      min-height: 100vh;
      line-height: 1.6;
    }

    /* 태블릿/키오스크용 강력한 확대 */
    @media (min-width: 768px) {
      body { max-width: 950px; padding: 50px; }
      .header img { max-width: 300px; margin-bottom: 20px; }
      .action-btn { padding: 60px 30px; font-size: 1.5rem; border-radius: 30px; }
      .btn-icon { font-size: 4rem; margin-bottom: 15px; }
      .step { padding: 40px; border-radius: 32px; }
      .step-title { font-size: 1.8rem; margin-bottom: 30px; }
      .step-num { width: 35px; height: 35px; font-size: 1.1rem; }
      input { padding: 30px; font-size: 2rem; border-radius: 20px; }
      .primary-btn { padding: 30px; font-size: 1.6rem; border-radius: 20px; }
      .btn-grid { gap: 20px; }
      .btn-item { padding: 35px 20px; font-size: 1.3rem; border-radius: 24px; }
      .summary-header { font-size: 1.6rem; margin-bottom: 25px; }
      .summary-item { padding: 20px 0; }
      .summary-time { font-size: 1.3rem; min-width: 120px; }
      .summary-names { font-size: 1.3rem; }
    }

    /* 로고 영역 */
    .header { text-align: center; padding: 20px 0 10px; }
    .header img { max-width: 320px; height: auto; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }

    /* 공지사항 배너 */
    #notice-banner { 
      background: var(--white);
      border-left: 4px solid var(--primary);
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 25px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 10px;
      overflow: hidden;
      position: relative;
    }
    #notice-content { 
      font-size: 0.95rem; 
      font-weight: 700; 
      color: var(--text-main);
      white-space: nowrap;
      width: max-content;
      animation: marquee 14s linear infinite;
    }
    @keyframes marquee {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }

    /* 메인 버튼 그리드 */
    .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
    .action-btn {
      padding: 30px 15px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 800;
      font-size: 1rem;
      text-align: center;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow);
      border: 1px solid var(--white);
    }
    .action-btn:active { transform: scale(0.95); }
    .btn-booking { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; }
    .btn-lookup { background: var(--white); color: var(--text-main); }
    .btn-icon { font-size: 2.2rem; margin-bottom: 10px; display: block; }

    /* 스텝 영역 */
    .step { 
      display: none; 
      background: var(--white); 
      padding: 25px; 
      border-radius: 24px; 
      margin-bottom: 20px; 
      box-shadow: var(--shadow);
      border: 1px solid #f1f5f9;
    }
    .active { display: block; animation: slideUp 0.4s ease-out; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    
    .step-title { font-size: 1.15rem; font-weight: 800; margin-bottom: 20px; color: var(--text-main); display: flex; align-items: center; gap: 8px; }
    .step-num { background: var(--primary); color: white; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; }

    /* 입력창 & 버튼 */
    input { 
      width: 100%; padding: 18px; font-size: 1.4rem; font-weight: 700; 
      border: 2px solid #e2e8f0; border-radius: 16px; background: #f8fafc;
      text-align: center; outline: none; transition: all 0.2s; margin-bottom: 15px;
    }
    input:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(107, 70, 193, 0.1); }
    
    .primary-btn { 
      width: 100%; padding: 18px; background: var(--primary); color: white; border: none; 
      border-radius: 16px; font-weight: 700; font-size: 1.1rem; cursor: pointer; 
      box-shadow: 0 4px 12px rgba(107, 70, 193, 0.3); transition: all 0.2s;
    }
    .primary-btn:active { transform: scale(0.97); }
    .primary-btn:disabled { background: #cbd5e0; cursor: not-allowed; box-shadow: none; }

    /* 리스트 버튼 그리드 */
    .btn-grid { display: grid; gap: 12px; }
    .grid-2 { grid-template-columns: 1fr 1fr; }
    .grid-3 { grid-template-columns: 1fr 1fr 1fr; }

    .btn-item { 
      padding: 18px 10px; border: 1.5px solid #e2e8f0; border-radius: 16px; background: white; 
      cursor: pointer; text-align: center; font-weight: 700; color: var(--text-main);
      transition: all 0.2s; font-size: 0.95rem; display: flex; flex-direction: column; gap: 4px;
    }
    .btn-item:active { transform: scale(0.96); }
    .selected { background: var(--primary) !important; color: white !important; border-color: var(--primary); transform: scale(1.02); box-shadow: 0 8px 15px rgba(107, 70, 193, 0.2); }
    .booked { background: #f1f5f9; color: #cbd5e0; cursor: not-allowed; border-color: #f1f5f9; }

    /* 하단 현황 섹션 */
    #summary-section { 
      margin-top: 40px; background: var(--white); padding: 25px; border-radius: 24px; 
      box-shadow: var(--shadow); border: 1px solid #f1f5f9;
    }
    .summary-header { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; font-weight: 800; font-size: 1.1rem; }
    .summary-item { padding: 12px 0; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
    .summary-item:last-child { border-bottom: none; }
    .summary-time { font-weight: 700; color: var(--primary); min-width: 70px; }
    .summary-names { color: var(--text-main); font-weight: 500; flex: 1; text-align: right; }

    .back-btn {
      background: #edf2f7;
      border: none;
      border-radius: 12px;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-main);
      transition: all 0.2s;
    }
    .back-btn:active { transform: scale(0.95); background: #e2e8f0; }

    /* 예약 현황 카드 스타일 */
    .cards-container { display: flex; flex-direction: column; gap: 20px; }
    .summary-card { 
      background: #ffffff; border-radius: 20px; border: 1px solid #edf2f7; 
      box-shadow: 0 4px 6px rgba(0,0,0,0.02); overflow: hidden; 
      transition: transform 0.2s;
    }
    .card-today { border: 2px solid var(--primary); box-shadow: 0 10px 20px rgba(107, 70, 193, 0.1); }
    
    .card-header { 
      padding: 12px 20px; background: #f8fafc; border-bottom: 1px solid #edf2f7;
      display: flex; justify-content: space-between; align-items: center;
    }
    .card-today .card-header { background: rgba(107, 70, 193, 0.05); }
    
    .card-date { font-weight: 800; font-size: 1.1rem; color: var(--text-main); }
    .today-badge { 
      background: var(--primary); color: white; padding: 4px 10px; 
      border-radius: 8px; font-size: 0.75rem; font-weight: 800; 
    }
    
    .card-body { padding: 10px 20px; }
    .no-res { padding: 15px; text-align: center; color: var(--text-sub); font-size: 0.9rem; opacity: 0.6; }
    
    .res-row { 
      padding: 12px 0; border-bottom: 1px dashed #edf2f7; 
      display: grid; grid-template-columns: 80px 1fr 100px; align-items: center;
      font-size: 1rem;
    }
    .res-row:last-child { border-bottom: none; }
    .res-time { font-weight: 700; color: var(--primary); }
    .res-name { font-weight: 600; color: var(--text-main); }
    .res-room { font-size: 0.85rem; color: var(--text-sub); text-align: right; }

    /* 태블릿용 글씨 크기 보정 */
    @media (min-width: 768px) {
      .card-date { font-size: 1.4rem; }
      .res-row { font-size: 1.25rem; grid-template-columns: 120px 1fr 150px; padding: 18px 0; }
      .res-room { font-size: 1.1rem; }
      .today-badge { font-size: 1rem; padding: 6px 15px; }
    }

    /* 로딩 애니메이션 복구 */
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: skeleton-loading 1.5s infinite;
      border-radius: 16px;
      margin-bottom: 10px;
    }
    @keyframes skeleton-loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
  <script src="bridge.js"></script>
</head>
<body>
  <div class="header">
    <img src="https://drive.google.com/thumbnail?id=1294x-K2aBT5CzyoNnaq2-6CPEIfyFEzk&sz=w1000" alt="점핑장 로고">
  </div> 

  <div id="notice-banner">
    <div id="notice-content">📢 개인 수건을 꼭 지참해주세요. 클럽 수건 및 찜질복 사용 시 대여비가 추가됩니다!</div>
  </div>

  <div id="main-screen">
    <div class="menu-grid">
      <div class="action-btn btn-booking" onclick="startBooking()">
        <span class="btn-icon">🌿</span>
        <span>테라피 예약</span>
      </div>
      <div class="action-btn btn-lookup" onclick="startLookup()">
        <span class="btn-icon">🔍</span>
        <span>예약 조회</span>
      </div>
    </div>

    <!-- 하단 현황 -->
    <div id="summary-section">
      <div class="summary-header">🗓️ 오늘의 예약 현황</div>
      <div id="summary-list" style="font-size:0.95rem; color:var(--text-sub);">불러오는 중...</div>
    </div>
  </div>

  <!-- 예약 흐름 영역 -->
  <div id="booking-flow" style="display:none;">
    <!-- Step 1: 본인 확인 -->
    <div id="step1" class="step active">
      <div class="step-title">
        <button class="back-btn" onclick="goBackToMain()">처음으로</button>
        <span class="step-num">1</span> 본인 확인
      </div>
      <p style="font-size:0.9rem; color:var(--text-sub); margin-bottom:15px; text-align:center;">휴대폰 번호 뒷자리 4자리를 입력하세요.</p>
      <input type="number" id="phoneInput" placeholder="예: 1234" pattern="\d*">
      <button class="primary-btn" id="nextBtn1" onclick="findID(true)">조회하기</button>
      <div id="step1-msg" style="margin-top:15px; text-align:center; font-weight:700;"></div>
    </div>

    <!-- Step 2: 회원 선택 -->
    <div id="step2" class="step">
      <div class="step-title">
        <button class="back-btn" onclick="showStep(1)">이전으로</button>
        <span class="step-num">2</span> 회원 선택
      </div>
      <div id="idList" class="btn-grid grid-2"></div>
    </div>

    <!-- Step 3: 날짜 선택 -->
    <div id="step3" class="step">
      <div class="step-title">
        <button class="back-btn" onclick="showStep(2)">이전으로</button>
        <span class="step-num">3</span> 날짜 선택
      </div>
      <p style="font-size:0.95rem; color:var(--text-sub); margin-bottom:15px; text-align:center;">예약하실 날짜를 확인해주세요.</p>
      <input type="date" id="dateInput">
      <button class="primary-btn" onclick="loadTimes()">시간 선택하기</button>
    </div>

    <!-- Step 4: 시간 선택 -->
    <div id="step4" class="step">
      <div class="step-title">
        <button class="back-btn" onclick="showStep(3)">이전으로</button>
        <span class="step-num">4</span> 시간 선택
      </div>
      <div id="timeList" class="btn-grid grid-2"></div>
      <button id="roomNextBtn" class="primary-btn" style="display:none; margin-top:25px;" onclick="loadRooms()">테라피 룸 선택하기</button>
    </div>

    <!-- Step 5: 방 선택 -->
    <div id="step5" class="step">
      <div class="step-title">
        <button class="back-btn" onclick="showStep(4)">이전으로</button>
        <span class="step-num">5</span> 테라피 룸 선택
      </div>
      <div id="roomList" class="btn-grid grid-3"></div>
      
      <div id="final-ui" style="display:none; margin-top:25px; padding:20px; background:#f0f7ff; border-radius:20px; border:2px dashed var(--primary-light);">
        <div id="confirm-info"></div>
        <button class="primary-btn" style="margin-top:20px; background:var(--success); box-shadow:0 4px 12px rgba(56, 161, 105, 0.3);" onclick="finish()">예약 확정하기</button>
      </div>
    </div>
  </div>

  <!-- 조회 영역 -->
  <div id="step-lookup" class="step">
    <div class="step-title">
      <button class="back-btn" onclick="goBackToMain()">처음으로</button>
      🔍 내 예약 조회
    </div>
    <p style="font-size:0.9rem; color:var(--text-sub); margin-bottom:15px; text-align:center;">휴대폰 번호 뒷자리 4자리</p>
    <input type="number" id="lookupPhone" placeholder="예: 1234" oninput="checkLookupInput()">
    <button id="lookupSearchBtn" class="primary-btn" onclick="findIDForLookup()" disabled>조회하기</button>
    <div id="lookupIdList" class="btn-grid grid-2" style="margin-top:20px;"></div>
    <div id="lookupResults" style="margin-top:25px; border-top:1px solid #f1f5f9; padding-top:20px;"></div>
  </div>


  <script>
    let resData = {};

    window.onload = function() {
      if (typeof google !== 'undefined' && google.script) {
        refreshSummary();
        setInterval(refreshSummary, 60000);
      }
    };

    // 이름 마스킹 함수 (개인정보 보호)
    function maskName(name) {
      if (!name) return "";
      if (name.length <= 2) return name[0] + "*";
      return name[0] + "*".repeat(name.length - 2) + name[name.length - 1];
    }

    function refreshSummary() {
      google.script.run.withSuccessHandler(data => {
        let h = "";
        const dates = Object.keys(data).sort();
        const today = new Date().toISOString().split('T')[0];

        if (dates.length === 0) {
          h = "<div style='text-align:center; padding:30px; opacity:0.6;'>예약 내역을 불러올 수 없습니다.</div>";
        } else {
          dates.forEach(date => {
            const list = data[date];
            const isToday = (date === today);
            const dateObj = new Date(date);
            const dayName = ["일","월","화","수","목","금","토"][dateObj.getDay()];
            const displayDate = `${dateObj.getMonth()+1}월 ${dateObj.getDate()}일 (${dayName})`;
            
            h += `
              <div class="summary-card ${isToday ? 'card-today' : ''}">
                <div class="card-header">
                  <span class="card-date">${displayDate}</span>
                  ${isToday ? '<span class="today-badge">오늘</span>' : ''}
                </div>
                <div class="card-body">
                  ${list.length === 0 ? '<div class="no-res">예약 없음</div>' : 
                    list.map(r => `
                      <div class="res-row">
                        <span class="res-time">${r.time}</span>
                        <span class="res-name">${r.name}</span>
                        <span class="res-room">${r.room}</span>
                      </div>
                    `).join('')
                  }
                </div>
              </div>
            `;
          });
        }
        document.getElementById('summary-list').innerHTML = `<div class="cards-container">${h}</div>`;
      }).getTodaySummary();
    }

    function startBooking() { 
      document.getElementById('main-screen').style.display='none'; 
      document.getElementById('step-lookup').style.display='none'; 
      document.getElementById('booking-flow').style.display='block'; 
      const phoneInput = document.getElementById('phoneInput');
      phoneInput.focus();
      phoneInput.oninput = function() {
        if (this.value.toString().length >= 4) findID(false);
      };
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    
    function startLookup() { 
      document.getElementById('main-screen').style.display='none'; 
      document.getElementById('booking-flow').style.display='none'; 
      document.getElementById('step-lookup').style.display='block'; 
      const lookupPhone = document.getElementById('lookupPhone');
      lookupPhone.focus();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function goBackToMain() {
      document.getElementById('main-screen').style.display='block'; 
      document.getElementById('booking-flow').style.display='none'; 
      document.getElementById('step-lookup').style.display='none'; 
      refreshSummary(); // 돌아올 때 현황 갱신
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function checkLookupInput() {
      const val = document.getElementById('lookupPhone').value;
      const btn = document.getElementById('lookupSearchBtn');
      if(val.length === 4) {
        btn.disabled = false;
        findIDForLookup(); // 자동 조회
      } else {
        btn.disabled = true;
      }
    }

    let currentMemberList = [];
    let lastQuery = "";

    function findID(isManual) {
      const inputEl = document.getElementById('phoneInput');
      const phoneVal = inputEl.value.toString().trim();
      const msgEl = document.getElementById('step1-msg');
      
      if(!phoneVal || phoneVal.length < 4) return;
      
      // [개선] 이미 조회가 완료된 번호고 회원 목록이 있다면 즉시 2단계로 이동
      if(isManual && phoneVal === lastQuery && currentMemberList.length > 0) {
        showStep(2);
        return;
      }

      if(!isManual && phoneVal === lastQuery) return; 
      
      lastQuery = phoneVal;
      const idList = document.getElementById('idList');
      const nextBtn = document.getElementById('nextBtn1');
      
      msgEl.innerHTML = ""; 
      idList.innerHTML = `<div class="skeleton" style="height:60px; grid-column:span 2;"></div>`; 
      nextBtn.innerText = "조회 중...";
      nextBtn.disabled = true;
      inputEl.disabled = true;
      
      google.script.run.withSuccessHandler(list => {
        inputEl.disabled = false;
        currentMemberList = list || [];
        
        if (currentMemberList.length === 0) {
          nextBtn.innerText = "다시 조회하기";
          nextBtn.disabled = false;
          msgEl.innerHTML = `<span style="color:var(--danger);">❌ 일치하는 회원이 없습니다.</span>`;
          lastQuery = ""; 
          return;
        }
        
        nextBtn.innerText = "조회 완료";
        nextBtn.disabled = false; // 항상 버튼 활성화 유지
        let h = ""; 
        currentMemberList.forEach((m, idx) => { 
          h += `<div class="btn-item" onclick="selectMemberByIndex(${idx})">${m.displayName}</div>`; 
        });
        idList.innerHTML = h;
        showStep(2);
      }).withFailureHandler(err => {
        nextBtn.innerText = "다시 조회하기";
        nextBtn.disabled = false;
        inputEl.disabled = false;
        lastQuery = ""; 
        msgEl.innerHTML = `<span style="color:var(--danger);">⚠️ 오류: ${err.message}</span>`;
      }).getMemberIDList(phoneVal);
    }

    function selectMemberByIndex(idx) {
      const m = currentMemberList[idx];
      if (m) selectMember(m);
    }

    function showStep(num) {
      for(let i=1; i<=5; i++) {
        const step = document.getElementById('step' + i);
        if (!step) continue;
        
        if (i === num) {
          step.style.display = 'block';
          step.classList.add('active');
          step.style.opacity = "1";
        } else {
          // 이전/이후 단계는 모두 숨겨서 현재 단계에만 집중하도록 함
          step.style.display = 'none';
          step.classList.remove('active');
        }
      }
      // 화면 상단으로 부드럽게 이동
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function selectMember(m) {
      const items = document.querySelectorAll('#idList .btn-item');
      items.forEach(item => { 
        if(item.innerText === m.displayName) item.classList.add('selected');
        else item.classList.remove('selected');
      });

      // [추가] 회원권 유효성 체크
      const msgEl = document.getElementById('step1-msg'); // 1단계 메시지창 재활용 또는 별도 알림
      showAppAlert("회원권 정보를 확인하고 있습니다...", "info");

      google.script.run.withSuccessHandler(res => {
        if (!res.success) {
          showAppAlert("회원권 조회 중 오류가 발생했습니다.", "error");
          return;
        }
        
        if (!res.hasValidTicket) {
          showAppAlert(`[${m.name}] 회원님은 현재 사용 가능한 회원권이 없습니다.\n(테라피/점핑권 만료 혹은 잔여횟수 부족)`, "error");
          return;
        }

        // 유효한 경우 진행
        resData.memberID = m.displayName; 
        resData.nameOnly = m.name;
        resData.phone = m.phone;
        
        showAppAlert(`${m.name}님, 확인되었습니다.\n보유권종: ${res.tickets}`, "success", "회원권 확인 완료");

        // [오늘 날짜 자동 세팅 - 한국 시간 기준]
        const dateInput = document.getElementById('dateInput');
        const now = new Date();
        const kstOffset = 9 * 60 * 60 * 1000;
        const kstDate = new Date(now.getTime() + kstOffset);
        const todayStr = kstDate.toISOString().split('T')[0];
        
        dateInput.min = todayStr; // 과거 날짜 선택 차단
        dateInput.value = todayStr; // 기본값 오늘로 설정
        
        showStep(3);
      }).checkMemberTicket(m.name, m.phone);
    }

    function loadTimes() {
      const selectedDate = document.getElementById('dateInput').value;
      if (!selectedDate) return;
      resData.date = selectedDate;

      const timeList = document.getElementById('timeList');
      timeList.innerHTML = `<div class="skeleton" style="height:120px; grid-column:span 2;"></div>`;
      document.getElementById('roomNextBtn').style.display = 'none'; // 다음 버튼 숨기기

      google.script.run.withSuccessHandler(times => {
        let h = "";
        if (typeof times === 'string' && times.startsWith("휴무:")) {
          h = `<div style="color:var(--danger); font-weight:bold; padding:20px; text-align:center; grid-column:span 2;">${times.split(":")[1]}</div>`;
        } else if (Array.isArray(times)) {
          times.forEach(t => {
            if(t.isFull) h += `<div class="btn-item booked">${t.display}</div>`;
            else h += `<div class="btn-item" onclick="selectTime(this, '${t.timeValue}')">${t.display}</div>`;
          });
        }
        timeList.innerHTML = h || "예약 가능한 시간이 없습니다.";
        showStep(4);
      }).getTodayTimetable(selectedDate);
    }

    function selectTime(el, t) {
      resData.time = t; 
      document.querySelectorAll('#timeList .btn-item').forEach(b => b.classList.remove('selected')); 
      el.classList.add('selected');
      
      // 다음 버튼 표시
      const nextBtn = document.getElementById('roomNextBtn');
      nextBtn.style.display = 'block';
      // 버튼 위치로 부드럽게 스크롤
      nextBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function loadRooms() {
      const btn = document.getElementById('roomNextBtn');
      const originalText = btn.innerText;
      btn.innerText = "방 정보 불러오는 중...";
      btn.disabled = true;

      const roomList = document.getElementById('roomList');
      roomList.innerHTML = `<div class="skeleton" style="height:100px; grid-column:span 3;"></div>`;

      google.script.run.withSuccessHandler(rooms => {
        btn.innerText = originalText;
        btn.disabled = false;
        
        let h = ""; 
        rooms.forEach(r => {
          if (r.isBooked) h += `<div class="btn-item booked"><span>${r.name}</span><span style="font-size:0.7rem; font-weight:400;">마감</span></div>`;
          else h += `<div class="btn-item" onclick="selectRoom(this, '${r.name}')"><span>${r.name}</span><span style="font-size:0.7rem; font-weight:400; color:var(--primary-light);">가능</span></div>`;
        });
        roomList.innerHTML = h;
        showStep(5);
      }).getRoomStatus(resData.date, resData.time);
    }

    function selectRoom(el, r) {
      resData.room = r; 
      document.querySelectorAll('#roomList .btn-item').forEach(b => b.classList.remove('selected')); 
      el.classList.add('selected');
      
      document.getElementById('confirm-info').innerHTML = `
        <div style="color:var(--text-main); font-size:0.95rem; line-height:1.8;">
          <div style="font-weight:800; color:var(--primary); font-size:1.1rem; margin-bottom:10px; text-align:center;">✨ 예약 정보 확인</div>
          • 성함: <b>${resData.nameOnly}</b><br>
          • 일시: <b>${resData.date} / ${resData.time}</b><br>
          • 배정 기기: <b>${resData.room}</b>
        </div>`;
        
      document.getElementById('final-ui').style.display='block';
    }

    function finish() {
      const btn = document.querySelector('#final-ui .primary-btn');
      const originalText = btn.innerText;
      btn.innerText = "예약 처리 중...";
      btn.disabled = true;

      google.script.run.withSuccessHandler(() => {
        document.body.innerHTML = `
          <div class="success-ui">
            <span class="success-icon">✅</span>
            <h2 style="font-weight:800; margin-bottom:10px;">예약이 완료되었습니다!</h2>
            <p style="color:var(--text-sub); margin-bottom:30px;">정성을 다해 준비하겠습니다.<br>예약 시간에 늦지 않게 방문해주세요.</p>
            <button class="primary-btn" onclick="location.reload()">처음으로</button>
          </div>`;
      }).withFailureHandler(err => {
        showAppAlert("예약 오류: " + err.message, "error");
        btn.innerText = originalText;
        btn.disabled = false;
      }).submitReservation(resData);
    }

    function findIDForLookup() {
      const val = document.getElementById('lookupPhone').value;
      const idList = document.getElementById('lookupIdList');
      idList.innerHTML = "조회 중...";

      google.script.run.withSuccessHandler(list => {
        if(!list || !list.length) {
          idList.innerHTML = "<div style='grid-column:span 2; text-align:center; padding:20px; color:var(--danger);'>회원을 찾을 수 없습니다.</div>";
          return;
        }
        let html = ""; 
        list.forEach(m => {
          html += `<div class="btn-item" onclick="finalLookup(event, '${m.phone}')">${m.displayName}</div>`;
        });
        idList.innerHTML = html;
      }).getMemberIDList(val);
    }

    function finalLookup(event, id) {
      document.querySelectorAll('#lookupIdList .btn-item').forEach(b => b.classList.remove('selected'));
      event.target.classList.add('selected');
      const results = document.getElementById('lookupResults');
      results.innerHTML = "내역 확인 중...";

      google.script.run.withSuccessHandler(list => {
        let html = "";
        if(!list.length) html = "<div style='color:var(--danger); text-align:center; padding:10px;'>진행 중인 예약 내역이 없습니다.</div>";
        else {
          html = "<div style='font-weight:700; margin-bottom:10px; font-size:0.9rem;'>확정된 예약 내역:</div>";
          list.forEach(r => html += `
            <div style="background:#f8fafc; border-radius:12px; padding:15px; margin-bottom:10px; border-left:4px solid var(--primary);">
              <div style="font-weight:700;">✅ ${r.date}</div>
              <div style="font-size:0.9rem; color:var(--text-sub);">${r.time} (${r.room})</div>
            </div>`);
        }
        results.innerHTML = html;
      }).getMyReservations(id);
    }
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js');
      });
    }
  </script>
</body>
</html>
