<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WISDOM WAREHOUSE - 노형 빌리지</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --wisdom-gold: #d4af37;
            --wisdom-gold-dark: #aa7c11;
            --wisdom-bg: #fdfbf7;
            --wisdom-paper: #fcf9f2;
            --wisdom-border: rgba(170, 124, 17, 0.2);
            --wisdom-wood: #2c1a04;
        }

        body {
            background-color: var(--wisdom-bg) !important;
            font-family: 'Outfit', 'Inter', 'Noto Sans KR', sans-serif;
            color: #2c1a04;
        }

        .wisdom-header-banner {
            background: linear-gradient(135deg, #2c1a04 0%, #1e1001 100%);
            color: #f7e7c4;
            padding: 35px 20px;
            text-align: center;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            box-shadow: 0 10px 30px rgba(44, 26, 4, 0.15);
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
            border-bottom: 3px solid var(--wisdom-gold);
        }

        .wisdom-header-banner::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.1) 0%, transparent 60%);
            pointer-events: none;
        }

        .wisdom-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px 15px 120px 15px;
        }

        /* 📰 신문/잡지 격자 레이아웃 */
        .magazine-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .magazine-item {
            background: var(--wisdom-paper);
            border-radius: 24px;
            border: 2px solid var(--wisdom-border);
            box-shadow: 0 8px 20px rgba(44, 26, 4, 0.04);
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        .magazine-item:active {
            transform: scale(0.97);
            box-shadow: 0 4px 10px rgba(44, 26, 4, 0.02);
        }

        /* 각 섹션별 크기 정의 */
        .magazine-item.sec-1 {
            grid-column: span 2;
            min-height: 220px;
        }

        .magazine-item.sec-2, 
        .magazine-item.sec-3 {
            grid-column: span 1;
            min-height: 180px;
        }

        .magazine-item.sec-4, 
        .magazine-item.sec-5 {
            grid-column: span 2;
            min-height: 110px;
        }

        /* 사진 카드 전용 스타일 */
        .magazine-item.has-img {
            justify-content: flex-end;
            background-size: cover;
            background-position: center;
        }

        .magazine-item.has-img::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(44, 26, 4, 0.92) 0%, rgba(44, 26, 4, 0.5) 50%, rgba(44, 26, 4, 0.25) 100%);
            z-index: 1;
        }

        .card-content-wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            height: 100%;
            justify-content: space-between;
        }

        /* 텍스트 전용 카드에는 한지 느낌의 왼쪽 금빛 띠 */
        .magazine-item.no-img::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 6px; height: 100%;
            background: linear-gradient(to bottom, var(--wisdom-gold) 0%, var(--wisdom-gold-dark) 100%);
        }

        /* 🎨 각 섹션별 은은하고 차별화된 파스텔 한지 바탕색 */
        .magazine-item.sec-1.no-img { 
            background: #fdfaf2; 
            border-color: rgba(212, 175, 55, 0.4); 
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.08);
        }
        .magazine-item.sec-2.no-img { 
            background: #f4fcf6; 
            border-color: rgba(76, 175, 80, 0.25); 
        }
        .magazine-item.sec-3.no-img { 
            background: #f5f9fe; 
            border-color: rgba(33, 150, 243, 0.25); 
        }
        .magazine-item.sec-4.no-img { 
            background: #fff8f8; 
            border-color: rgba(244, 63, 94, 0.25); 
        }
        .magazine-item.sec-5.no-img { 
            background: #fefdf6; 
            border-color: rgba(234, 179, 8, 0.25); 
        }

        /* 📜 입체형 더보기(자세히 읽기) 버튼 스타일 */
        .scroll-more-btn {
            font-size: 0.65rem;
            font-weight: 900;
            padding: 5px 12px;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
        }
        .scroll-more-btn.no-img-btn {
            background: rgba(44, 26, 4, 0.06);
            color: var(--wisdom-wood);
            border: 1px solid rgba(44, 26, 4, 0.1);
        }
        .scroll-more-btn.img-btn {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(5px);
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
        .magazine-item:hover .scroll-more-btn.no-img-btn {
            background: var(--wisdom-wood);
            color: #f7e7c4;
            transform: translateY(-1px);
        }
        .magazine-item:hover .scroll-more-btn.img-btn {
            background: #fff;
            color: var(--wisdom-wood);
            text-shadow: none;
            transform: translateY(-1px);
        }

        .scroll-category {
            font-size: 0.62rem;
            font-weight: 900;
            color: var(--wisdom-gold-dark);
            background: rgba(212, 175, 55, 0.15);
            padding: 3px 9px;
            border-radius: 20px;
            display: inline-block;
            align-self: flex-start;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .scroll-title {
            font-size: 0.95rem;
            font-weight: 900;
            color: var(--wisdom-wood);
            margin: 0 0 6px 0;
            line-height: 1.35;
            word-break: keep-all;
        }

        .scroll-excerpt {
            font-size: 0.75rem;
            font-weight: 700;
            color: #5c4a37;
            margin: 0 0 10px 0;
            line-height: 1.5;
            word-break: keep-all;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .scroll-meta {
            font-size: 0.62rem;
            color: #7c6a56;
            font-weight: 800;
            display: flex;
            gap: 10px;
            margin-top: auto;
        }

        /* 👍 리액션 및 모달 상세 영역 */
        .scroll-reactions {
            display: flex;
            gap: 10px;
            border-top: 1px solid rgba(170, 124, 17, 0.1);
            border-bottom: 1px solid rgba(170, 124, 17, 0.1);
            padding: 12px 0;
            margin-bottom: 15px;
        }

        .reaction-btn {
            flex: 1;
            background: white;
            border: 1.5px solid var(--wisdom-border);
            padding: 10px;
            border-radius: 14px;
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--wisdom-wood);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .reaction-btn:active {
            transform: scale(0.95);
        }

        .reaction-btn.liked {
            background: #fff5f5;
            border-color: #feb2b2;
            color: #e53e3e;
        }

        .reaction-btn.insightful {
            background: #fefcbf;
            border-color: #faf089;
            color: #b7791f;
        }

        .comments-section {
            background: rgba(44, 26, 4, 0.03);
            border-radius: 18px;
            padding: 15px;
        }

        .comment-item {
            border-bottom: 1px solid rgba(44, 26, 4, 0.06);
            padding: 8px 0;
            font-size: 0.75rem;
            font-weight: 700;
            color: #4a3c2c;
        }

        .comment-item:last-child {
            border-bottom: none;
        }

        .comment-author {
            font-weight: 900;
            color: var(--wisdom-gold-dark);
            margin-right: 8px;
        }

        .comment-input-container {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .comment-input {
            flex: 1;
            border: 1.5px solid var(--wisdom-border);
            border-radius: 12px;
            padding: 8px 12px;
            font-size: 0.75rem;
            font-weight: 700;
            box-sizing: border-box;
            background: white;
        }

        .comment-input:focus {
            outline: none;
            border-color: var(--wisdom-gold-dark);
        }

        .comment-submit-btn {
            background: var(--wisdom-wood);
            color: #f7e7c4;
            border: none;
            padding: 8px 15px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 0.75rem;
            cursor: pointer;
        }

        /* 🚪 GOLDEN SCROLL DETAIL / ARCHIVE MODAL */
        .scroll-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(44, 26, 4, 0.6); backdrop-filter: blur(10px);
            display: none; align-items: center; justify-content: center;
            z-index: 2000; padding: 15px; box-sizing: border-box;
        }

        .scroll-body {
            background: #fdfaf2; border: 3px solid #aa7c11; border-radius: 30px;
            width: 100%; max-width: 480px; padding: 25px; color: #2c1a04;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4); position: relative;
            background-image: url('https://www.transparenttextures.com/patterns/lined-paper-2.png');
            box-sizing: border-box;
            animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .scroll-body::before {
            content: ''; position: absolute; left: 8px; top: 0; height: 100%; width: 5px;
            background: linear-gradient(to bottom, #d4af37, #aa7c11);
        }

        .scroll-modal-title { font-size: 1.1rem; font-weight: 900; color: #4a2c00; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }

        .scroll-close-btn {
            position: absolute; top: 15px; right: 15px; width: 28px; height: 28px;
            background: #ef4444; border-radius: 50%; color: white; font-weight: 900;
            display: flex; align-items: center; justify-content: center; border: 2px solid white; cursor: pointer;
            z-index: 100;
            font-size: 0.8rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* 🏛️ 아카이브 드로어 전용 스타일 */
        .archive-row-item {
            background: white;
            border: 1.5px solid var(--wisdom-border);
            border-radius: 16px;
            padding: 14px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 800;
            box-shadow: 0 4px 10px rgba(44, 26, 4, 0.02);
            box-sizing: border-box;
        }

        .archive-row-item:active {
            transform: scale(0.98);
        }

        .archive-row-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.65rem;
            color: var(--wisdom-gold-dark);
            margin-bottom: 5px;
            font-weight: 900;
        }

        .archive-row-title {
            font-size: 0.85rem;
            color: var(--wisdom-wood);
            line-height: 1.35;
            word-break: keep-all;
        }

        /* 🏷️ 명품 아카이브 선포 버튼 */
        .btn-open-archive {
            background: linear-gradient(135deg, var(--wisdom-wood) 0%, #170d02 100%);
            border: 2px solid var(--wisdom-gold);
            color: #f7e7c4;
            width: 100%;
            padding: 16px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 0.88rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 6px 20px rgba(44, 26, 4, 0.15);
            transition: all 0.2s;
            margin-top: 10px;
        }

        .btn-open-archive:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body style="margin:0; padding:0;">
    <!-- [v65.3] 로딩 오버레이 완전 제거 (원장님 지시 수용: 백그라운드 무진동 로딩 적용) -->

    <header class="v-global-header" style="background: var(--wisdom-wood); border-bottom: 2px solid var(--wisdom-gold);">
        <div style="display:flex; justify-content:space-between; align-items:center; width:100%; max-width:500px; margin:0 auto;">
            <div style="width:40px;"></div>
            <h1 style="color:#f7e7c4;">웰니스 지식창고</h1>
            <button class="v-header-logout" id="header-logout-btn" onclick="Auth.logout()" title="마을 퇴장" style="display: flex !important;">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </header>

    <div class="v-profile-bar" style="background: rgba(170, 124, 17, 0.08); border-bottom: 1px solid rgba(170, 124, 17, 0.15);">
        <div class="v-status-badge" id="user-status-badge" style="background: var(--wisdom-wood); color: #f7e7c4; border: 1px solid var(--wisdom-gold);">
            <div class="v-status-dot" id="user-status-dot" style="background:#f7e7c4;"></div>
            <span id="user-status-name">정보 로딩 중...</span>
        </div>
        <div style="font-size: 0.7rem; color: var(--wisdom-gold-dark); font-weight: 800;" id="user-status-phone">
            NO SESSION
        </div>
    </div>


    <div class="wisdom-container">
        
        <!-- 📰 황금 건강 매거진 그리드 리스트 -->
        <div class="magazine-grid" id="wisdom-magazine-grid">
            <!-- Dynamic Grid Items will be injected here -->
        </div>

        <!-- 🏛️ 지난 웰니스 상식 모아보기 버튼 -->
        <button class="btn-open-archive" onclick="openArchiveList()">
            🌿 지난 웰니스 상식 모아보기 <i class="fa-solid fa-chevron-right" style="font-size:0.75rem;"></i>
        </button>

    </div>

    <!-- 📜 고서 상세 정독 모달 팝업 -->
    <div id="tip-detail-modal" class="scroll-modal" style="display: none;">
        <div class="scroll-body" style="max-height: 88vh; overflow-y: auto;">
            <div class="scroll-close-btn" onclick="closeTipPopup()">X</div>
            <div id="tip-detail-container">
                <!-- Detailed content will be injected dynamically -->
            </div>
        </div>
    </div>

    <!-- 🏛️ 지난 웰니스 상식 (과거 목록) 드로어 모달 -->
    <div id="archive-list-modal" class="scroll-modal" style="display: none; align-items: flex-end; padding: 0;">
        <div class="scroll-body" style="max-width: 500px; border-bottom-left-radius: 0; border-bottom-right-radius: 0; border-top-left-radius: 30px; border-top-right-radius: 30px; border-bottom: none; max-height: 80vh; overflow-y: auto; -webkit-overflow-scrolling: touch; margin-bottom: 0; padding-bottom: 120px; width: 100%;">
            <div class="scroll-close-btn" onclick="closeArchiveList()" style="top: 18px; right: 18px;">X</div>
            
            <div class="scroll-modal-title" style="color: var(--wisdom-wood); font-weight: 900; margin-bottom: 20px;">
                🌿 지난 웰니스 상식 목록
            </div>
            
            <div id="archive-tips-list" style="display: flex; flex-direction: column; gap: 12px;">
                <!-- Historical items row will be injected here -->
            </div>
        </div>
    </div>

    <!-- 📱 GLOBAL VILLAGE NAV -->
    <nav class="v-nav">
        <a href="index.html" class="v-nav-item">
            <i class="fas fa-home"></i>
            <span>광장</span>
        </a>
        <a href="miracle.html" class="v-nav-item">
            <i class="fas fa-camera"></i>
            <span>아카이브</span>
        </a>
        <a href="oasis.html" class="v-nav-item">
            <i class="fas fa-water"></i>
            <span>오아시스</span>
        </a>
        <a href="wisdom.html" class="v-nav-item active">
            <i class="fas fa-book"></i>
            <span>지식창고</span>
        </a>
        <a href="reservation.html" class="v-nav-item">
            <img src="therapy-icon.png" style="width: 22px; height: 22px; margin-bottom: 2px; border-radius: 4px;">
            <span>테라피(예약)</span>
        </a>
    </nav>

    <script src="bridge.js"></script>
    <script>
        let currentUser = { name: '', phone: '' };
        
        // 초기 기본 고정 섹션 (데이터가 한 건도 없을 때 디폴트 플레이스홀더)
        const defaultTips = {
            "섹션 1": { id: 0, title: "수석 에디터의 칼럼을 준비하는 중 🌿", content: "관리자 화면에서 '섹션 1' 카테고리로 건강 칼럼을 집필하여 회원들의 건강 지식을 밝혀주세요!", category: "섹션 1", author: "수석에디터", date: "2026-05-24", likes: 0, insights: 0, comments: [] },
            "섹션 2": { id: 0, title: "건강 식단 가이드 준비 중 🍱", content: "관리자 화면에서 '섹션 2' 카테고리로 새로운 식단 가이드를 집필해 주세요!", category: "섹션 2", author: "수석에디터", date: "2026-05-24", likes: 0, insights: 0, comments: [] },
            "섹션 3": { id: 0, title: "항상성 운동 프로그램 준비 중 🏃", content: "관리자 화면에서 '섹션 3' 카테고리로 새로운 홈트레이닝 꿀팁을 집필해 주세요!", category: "섹션 3", author: "수석에디터", date: "2026-05-24", likes: 0, insights: 0, comments: [] }
        };

        function renderLoginStatus() {
            const uName = localStorage.getItem('v44_user_name');
            const uPhone = localStorage.getItem('v44_user_phone');
            const badge = document.getElementById('user-status-badge');
            const dot = document.getElementById('user-status-dot');
            const nameEl = document.getElementById('user-status-name');
            const phoneEl = document.getElementById('user-status-phone');
            const logoutBtn = document.getElementById('header-logout-btn');

            if (uName && uPhone) {
                currentUser.name = uName;
                currentUser.phone = uPhone;
                nameEl.innerText = `${uName}(${uPhone.slice(-4)}) 님 접속중!`;
                const uTier = localStorage.getItem('v44_user_tier') || "🌱 회원";
                phoneEl.innerText = uTier;
                logoutBtn.style.display = "flex";
            }
        }

        function loadWisdomTips() {
            const phone = localStorage.getItem('v44_user_phone') || '';
            
            if (typeof google === 'undefined') {
                // 오프라인/개발 환경 테스트용 모킹 렌더링
                renderMagazine([], null);
                return;
            }

            let loadedTips = null;
            let loadedQuest = null;

            function checkAndRender() {
                if (loadedTips !== null && loadedQuest !== null) {
                    window.allWisdomTips = loadedTips;
                    renderMagazine(loadedTips, loadedQuest);
                }
            }

            // 1. 지식창고 칼럼 목록 조회
            google.script.run
                .withSuccessHandler(tips => {
                    loadedTips = tips || [];
                    checkAndRender();
                })
                .getWisdomTipsWithReactions();

            // 2. 오늘의 돌발 퀘스트 조회 (로그인 세션이 있을 경우에만 실행)
            if (phone) {
                google.script.run
                    .withSuccessHandler(res => {
                        loadedQuest = res || { todayQuest: null };
                        checkAndRender();
                    })
                    .getActiveQuestStatus(phone);
            } else {
                loadedQuest = { todayQuest: null };
                checkAndRender();
            }
        }

        function renderMagazine(tips, questStatus) {
            const gridContainer = document.getElementById('wisdom-magazine-grid');
            
            // 1. 오늘의 돌발 퀘스트 키워드 추출
            let todayQuestTitle = "";
            if (questStatus && questStatus.todayQuest && questStatus.todayQuest.title) {
                todayQuestTitle = questStatus.todayQuest.title;
            }
            
            // 다이어트 주요 키워드 사전 선언 (오늘의 퀘스트 제목에서 이 키워드를 검출)
            const keywordList = ["식이섬유", "수분", "물", "오운완", "단식", "체지방", "근육", "단백질", "유산소", "스트레칭", "습관", "식단", "채소"];
            let detectedKeyword = "";
            for (let i = 0; i < keywordList.length; i++) {
                const kw = keywordList[i];
                if (todayQuestTitle.indexOf(kw) > -1) {
                    detectedKeyword = kw;
                    break;
                }
            }
            
            console.log(`🎯 오늘의 돌발 퀘스트 제목: "${todayQuestTitle}" ➔ 매칭 키워드: "${detectedKeyword}"`);

            // 💡 [v66.2] 지능형 텍스트 정규화 비교 함수 (대소문자 무시, 모든 띄어쓰기 제거, 문장부호 싹 제거)
            function normalizeTextForMatch(str) {
                if (!str) return "";
                return String(str)
                    .toLowerCase()
                    .replace(/\s+/g, "")
                    .replace(/[!?,.『』'"]/g, "")
                    .trim();
            }

            // 2. 다이내믹 매칭을 위한 팁 필터링 (0순위 J열 1:1 타겟 매칭 + 1순위 키워드 매칭)
            let relatedTips = [];
            const normalizedTodayQuest = normalizeTextForMatch(todayQuestTitle);
            
            relatedTips = tips.filter(t => {
                // 0순위: J열 타겟 퀘스트 지정 매칭 (원장님의 1:1 웰니스 정리 Day 매칭 기획)
                if (t.targetQuest) {
                    const normalizedTarget = normalizeTextForMatch(t.targetQuest);
                    if (normalizedTarget && normalizedTodayQuest.indexOf(normalizedTarget) > -1) {
                        return true;
                    }
                }
                
                // 1순위: 다이내믹 키워드 매칭
                if (detectedKeyword) {
                    return (t.title && t.title.indexOf(detectedKeyword) > -1) ||
                           (t.content && t.content.indexOf(detectedKeyword) > -1) ||
                           (t.category && t.category.indexOf(detectedKeyword) > -1);
                }
                
                return false;
            });

            // 🌟 원장님의 명설계: 관련 글들은 스프레드시트 등록 순서(ID 오름차순)를 보존하여
            // '1.식이섬유란? ➔ 2.종류 ➔ 3.음식' 처럼 기획 연재 흐름을 1번 섹션 왕좌부터 아름답게 안착시킵니다!
            relatedTips.sort((a, b) => a.id - b.id);

            // 3. 기본 게시물(isDefault) 목록 필터링 (이미 매칭된 글 제외)
            const defaultTipsInDb = tips.filter(t => 
                t.isDefault === true && 
                !relatedTips.some(rt => rt.id === t.id)
            );
            // 기본 게시물은 최신에 등록된 기본글이 우선 수혈되도록 최신순(ID 내림차순)으로 배열합니다.
            defaultTipsInDb.sort((a, b) => b.id - a.id);

            // 4. 기타 일반 게시물 목록 (빵꾸 대비용 최종 수혈)
            const remainingTips = tips.filter(t => 
                !relatedTips.some(rt => rt.id === t.id) &&
                !defaultTipsInDb.some(dt => dt.id === t.id)
            );
            // 일반 게시물(빵꾸 대비)은 최신글이 먼저 수혈되도록 최신순(ID 내림차순)으로 배열합니다.
            remainingTips.sort((a, b) => b.id - a.id);

            // 5. 1번 섹션부터 5번 섹션까지 물 흐르듯 채울 최종 통합 큐레이션 리스트 작성
            const curatedTips = [];
            
            // A. 가장 먼저 관련 팁을 선두에 배치 (섹션 1부터 도배 시작!)
            curatedTips.push(...relatedTips);
            
            // B. 자리가 남으면 최신 기본 게시물로 채우기
            curatedTips.push(...defaultTipsInDb);
            
            // C. 그래도 자리가 남으면 최신 일반 게시물로 끝까지 채우기
            curatedTips.push(...remainingTips);

            // 6. 각 섹션에 착지시키기
            // curatedTips의 순서대로 섹션 1, 2, 3, 4, 5번 카드를 차례대로 매핑합니다.
            const sec1Tip = curatedTips[0] || defaultTips["섹션 1"];
            const sec2Tip = curatedTips[1] || defaultTips["섹션 2"];
            const sec3Tip = curatedTips[2] || defaultTips["섹션 3"];
            const sec4Tip = curatedTips[3] || null; // 4, 5번 섹션은 없으면 렌더링하지 않음
            const sec5Tip = curatedTips[4] || null;

            let html = "";
            
            // 섹션 1, 2, 3은 상시 렌더링
            html += getCardHtml("sec-1", sec1Tip);
            html += getCardHtml("sec-2", sec2Tip);
            html += getCardHtml("sec-3", sec3Tip);
            
            // 섹션 4와 5는 유동적 바인딩
            if (sec4Tip) html += getCardHtml("sec-4", sec4Tip);
            if (sec5Tip) html += getCardHtml("sec-5", sec5Tip);

            gridContainer.innerHTML = html;
        }

        function getCardHtml(sectionClass, t) {
            if (!t) return "";
            
            // 본문 요약문 생성 및 섹션별 길이 차등화
            let excerpt = String(t.content || "");
            let limit = 45;
            if (sectionClass === 'sec-1') {
                limit = 80;
            } else if (sectionClass === 'sec-4' || sectionClass === 'sec-5') {
                limit = 28;
            }
            if (excerpt.length > limit) excerpt = excerpt.substring(0, limit) + "...";
            
            const hasImage = t.image && String(t.image).trim().length > 10;
            // 작은따옴표(') 기호 충돌로 인한 CSS 파괴 버그를 URL 안전 문자(%27) 치환을 통해 철저히 방지!
            // 개행문자 및 앞뒤 공백을 확실하게 청소하여 CSS background-image가 파괴되는 현상을 완벽히 차단합니다.
            const safeImageUrl = hasImage ? String(t.image).trim().replace(/\r?\n|\r/g, "").replace(/'/g, "%27") : "";
            const cardStyle = hasImage 
                ? `background-image: url('${safeImageUrl}');`
                : ``;
                
            // 더보기 입체형 버튼 마크업
            const moreBtnHtml = hasImage
                ? `<span class="scroll-more-btn img-btn">자세히 읽기 <i class="fa-solid fa-arrow-right"></i></span>`
                : `<span class="scroll-more-btn no-img-btn">자세히 읽기 <i class="fa-solid fa-arrow-right"></i></span>`;

            return `
                <div class="magazine-item ${sectionClass} ${hasImage ? 'has-img' : 'no-img'}" style="${cardStyle}" onclick="openTipPopup(${t.id})">
                    <div class="card-content-wrapper" style="${hasImage ? 'padding: 22px 18px 18px 18px;' : 'padding: 18px;'}">
                        <div style="display: flex; flex-direction: column; gap: 6px;">
                            <h3 class="scroll-title" style="${hasImage ? 'color: #fff; text-shadow: 0 2px 5px rgba(0,0,0,0.95);' : ''}">${t.title}</h3>
                            <p class="scroll-excerpt" style="${hasImage ? 'color: #f7e7c4; text-shadow: 0 1px 3px rgba(0,0,0,0.9); opacity: 0.95;' : 'color: #4a3c2c;'}">${excerpt}</p>
                        </div>
                        <div style="margin-top: auto; padding-top: 10px; display: flex; justify-content: flex-end;">
                            ${moreBtnHtml}
                        </div>
                    </div>
                </div>
            `;
        }

        // 📜 고서 상세 모달 팝업 열기
        function openTipPopup(id) {
            let t = (window.allWisdomTips || []).find(item => item.id === id);
            
            // 만약 디폴트 플레이스홀더 카드 클릭 시 예외 처리
            if (!t && id === 0) {
                const allDefaults = Object.values(defaultTips);
                t = allDefaults.find(item => item.title.indexOf("대기 중") > -1 || item.title.indexOf("준비 중") > -1);
            }
            
            if (!t) return;
            
            let friendlyCategory = String(t.category || "건강지식");

            const modal = document.getElementById('tip-detail-modal');
            const container = document.getElementById('tip-detail-container');
            
            const commentMarkup = (t.comments || []).map(c => `
                <div class="comment-item">
                    <span class="comment-author">👤 ${c.author}:</span>
                    <span>${c.content}</span>
                </div>
            `).join('');
            
            const hasImage = t.image && t.image.trim().length > 10;
            
            container.innerHTML = `
                <span class="scroll-category">📖 ${friendlyCategory}</span>
                <h2 style="font-size: 1.2rem; font-weight: 900; color: var(--wisdom-wood); margin: 8px 0 10px 0; line-height: 1.4; word-break: keep-all;">${t.title}</h2>
                <div class="scroll-meta" style="margin-bottom: 20px;">
                    <span>✍️ 작성자: ${t.author}</span>
                    <span>📅 날짜: ${t.date}</span>
                </div>
                
                ${hasImage ? `<img src="${t.image}" style="width: 100%; border-radius: 18px; margin-bottom: 20px; border: 1.5px solid var(--wisdom-border); box-shadow: 0 6px 15px rgba(0,0,0,0.06);" />` : ''}
                
                <div class="scroll-content" style="font-size: 0.85rem; line-height: 1.8; color: #2c1a04; white-space: pre-wrap; word-break: keep-all; margin-bottom: 25px; font-weight: 700;">${t.content}</div>
                
                <!-- 👍 리액션 패널 -->
                <div class="scroll-reactions">
                    <button class="reaction-btn" onclick="sendReaction(${t.id}, 'like', this)">
                        ❤️ 공감하기 (<span class="like-cnt">${t.likes || 0}</span>)
                    </button>
                    <button class="reaction-btn" onclick="sendReaction(${t.id}, 'insight', this)">
                        💡 깊은 깨달음 (<span class="insight-cnt">${t.insights || 0}</span>)
                    </button>
                </div>
                
                <!-- 💬 칭찬 코멘트 패널 -->
                <div class="comments-section" style="margin-top: 20px;">
                    <div style="font-weight:900; font-size:0.75rem; color:var(--wisdom-wood); margin-bottom:10px;">
                        <i class="fa-regular fa-comment-dots"></i> 회원님들의 칭찬과 소망 한마디 (${t.comments ? t.comments.length : 0})
                    </div>
                    <div class="comments-list" id="comments-list-${t.id}">
                        ${commentMarkup || '<div style="font-size:0.7rem; color:#999; text-align:center; padding:15px 0;">첫 건강 다짐 코멘트를 남겨보세요!</div>'}
                    </div>
                    
                    ${t.id > 0 ? `
                    <div class="comment-input-container">
                        <input type="text" id="comment-input-${t.id}" class="comment-input" placeholder="칭찬 한마디와 건강 다짐을 적으세요...">
                        <button class="comment-submit-btn" onclick="submitComment(${t.id})">보내기</button>
                    </div>
                    ` : ''}
                </div>
            `;
            
            modal.style.display = 'flex';
            
            // 🌌 [Global Backbutton] 뒤로가기 모달 백스택 감지 등록
            if (window.registerModalOpen) {
                window.registerModalOpen(closeTipPopup);
            }
        }

        function closeTipPopup(isFromPopState) {
            document.getElementById('tip-detail-modal').style.display = 'none';
            
            // 🌌 [Global Backbutton] 수동(X 버튼)으로 닫았을 때 백스택에서 안전하게 해제
            if (!isFromPopState && window.registerModalClose) {
                window.registerModalClose(closeTipPopup);
            }
        }

        // 🏛️ 지난 황금 고서첩 (과거 목록) 드로어 열기
        function openArchiveList() {
            const modal = document.getElementById('archive-list-modal');
            const listContainer = document.getElementById('archive-tips-list');
            
            const tips = window.allWisdomTips || [];
            
            if (tips.length === 0) {
                listContainer.innerHTML = `
                    <div style="text-align:center; padding:30px; font-size:0.75rem; color:#7c6a56; font-weight:800;">
                        🌿 아직 보관된 과거 건강 지식이 없습니다.
                    </div>
                `;
            } else {
                listContainer.innerHTML = tips.map(t => `
                    <div class="archive-row-item" onclick="closeArchiveList(); openTipPopup(${t.id})">
                        <div class="archive-row-meta">
                            <span>📖 ${t.category}</span>
                            <span>📅 ${t.date ? t.date.split(" ")[0] : ""}</span>
                        </div>
                        <div class="archive-row-title">${t.title}</div>
                    </div>
                `).join('');
            }
            
            modal.style.display = 'flex';
            
            // 🌌 [Global Backbutton] 뒤로가기 드로어 백스택 감지 등록
            if (window.registerModalOpen) {
                window.registerModalOpen(closeArchiveList);
            }
        }

        function closeArchiveList(isFromPopState) {
            document.getElementById('archive-list-modal').style.display = 'none';
            
            // 🌌 [Global Backbutton] 수동(X 버튼)으로 닫았을 때 백스택에서 안전하게 해제
            if (!isFromPopState && window.registerModalClose) {
                window.registerModalClose(closeArchiveList);
            }
        }

        function sendReaction(tipId, type, btnEl) {
            if (tipId === 0) return alert("플레이스홀더 카드에는 리액션을 남길 수 없습니다. 🏺");
            if (typeof google === 'undefined') return;
            
            // UI 낙관적 반영
            const cntSpan = btnEl.querySelector(type === 'like' ? '.like-cnt' : '.insight-cnt');
            let cur = parseInt(cntSpan.innerText) || 0;
            cntSpan.innerText = cur + 1;
            
            btnEl.classList.add(type === 'like' ? 'liked' : 'insightful');
            btnEl.disabled = true;

            google.script.run
                .withSuccessHandler(res => {
                    if (!res.success) {
                        console.error("Reaction failed:", res.error);
                    }
                })
                .addWisdomReaction({ tipId: tipId, type: type });
        }

        function submitComment(tipId) {
            if (tipId === 0) return alert("플레이스홀더 카드에는 코멘트를 남길 수 없습니다. 🏺");
            const input = document.getElementById(`comment-input-${tipId}`);
            const text = input.value.trim();
            if (!text) {
                alert("내용을 입력해 주세요!");
                return;
            }
            
            const payload = {
                tipId: tipId,
                author: currentUser.name,
                content: text
            };

            if (typeof google !== 'undefined') {
                google.script.run
                    .withSuccessHandler(res => {
                        if (res.success) {
                            input.value = '';
                            
                            // 실시간 상세 팝업 내부 댓글 즉시 갱신
                            google.script.run.withSuccessHandler(newTips => {
                                window.allWisdomTips = newTips;
                                // 팝업 리렌더링
                                openTipPopup(tipId);
                            }).getWisdomTipsWithReactions();
                        } else {
                            alert("코멘트 기록 실패: " + res.error);
                        }
                    })
                    .addWisdomComment(payload);
            } else {
                alert("구글 연동 환경이 아닙니다.");
            }
        }

        function showLoading(msg) {
            // [v65.3] 로딩 장막 소거로 인한 무력화
        }

        function hideLoading() {
            // [v65.3] 로딩 장막 소거로 인한 무력화
        }

        window.onload = function() {
            Auth.check();
            renderLoginStatus();
            loadWisdomTips(); // ⚡ 불필요한 300ms 로딩 딜레이를 즉시 제거하여 초기 기동 속도를 대폭 단축했습니다.
        };
    </script>
</body>
</html>
