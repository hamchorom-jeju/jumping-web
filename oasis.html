<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADVENTURER'S OASIS - 노형 빌리지</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --oasis-bg: #f0fdf4;
            --oasis-emerald: #0f766e;
            --oasis-mint: #0d9488;
            --oasis-sand: #fef08a;
            --oasis-glass: rgba(255, 255, 255, 0.8);
        }

        body {
            background-color: var(--oasis-bg) !important;
            font-family: 'Outfit', 'Inter', 'Noto Sans KR', sans-serif;
            color: #1e293b;
        }

        .oasis-header-banner {
            background: linear-gradient(135deg, #0f766e 0%, #115e59 100%);
            color: white;
            padding: 35px 20px;
            text-align: center;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            box-shadow: 0 10px 30px rgba(15, 118, 110, 0.15);
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
        }

        .oasis-header-banner::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(254, 240, 138, 0.12) 0%, transparent 60%);
            pointer-events: none;
        }

        .oasis-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 0 15px 120px 15px;
        }

        .oasis-input-card {
            background: var(--oasis-glass);
            backdrop-filter: blur(12px);
            border-radius: 30px;
            padding: 25px;
            border: 2px solid rgba(13, 148, 136, 0.2);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.05);
            margin-bottom: 25px;
            transition: all 0.3s ease;
        }

        .oasis-input-card:focus-within {
            border-color: var(--oasis-mint);
            box-shadow: 0 12px 35px rgba(13, 148, 136, 0.12);
        }

        .oasis-textarea {
            width: 100%;
            height: 100px;
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: 20px;
            padding: 15px;
            font-size: 0.85rem;
            font-weight: 700;
            resize: none;
            box-sizing: border-box;
            background: #fff;
            color: #334155;
            transition: all 0.3s;
        }

        .oasis-textarea:focus {
            outline: none;
            border-color: var(--oasis-mint);
            box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.1);
        }

        .oasis-title-input {
            width: 100%;
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: 15px;
            padding: 12px 15px;
            font-size: 0.85rem;
            font-weight: 800;
            margin-bottom: 12px;
            box-sizing: border-box;
            background: #fff;
            color: #334155;
        }

        .oasis-title-input:focus {
            outline: none;
            border-color: var(--oasis-mint);
        }

        .oasis-checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 15px 0;
            padding: 10px 15px;
            background: rgba(254, 240, 138, 0.3);
            border-radius: 15px;
            border: 1.5px dashed rgba(234, 179, 8, 0.5);
            font-size: 0.75rem;
            font-weight: 900;
            color: #854d0e;
        }

        .oasis-checkbox-container input {
            width: 16px;
            height: 16px;
            accent-color: var(--oasis-mint);
            cursor: pointer;
        }

        .oasis-submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 0.95rem;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(13, 148, 136, 0.25);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .oasis-submit-btn:active {
            transform: scale(0.98);
        }

        .oasis-post-card {
            background: white;
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(0,0,0,0.04);
            box-shadow: 0 8px 24px rgba(0,0,0,0.02);
            transition: transform 0.2s;
            position: relative;
        }

        .oasis-post-card:hover {
            transform: translateY(-2px);
        }

        .oasis-post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .oasis-post-author {
            font-weight: 900;
            font-size: 0.85rem;
            color: var(--oasis-emerald);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .oasis-post-date {
            font-size: 0.68rem;
            color: var(--text-dim);
            font-weight: 700;
        }

        .oasis-post-title {
            font-size: 0.9rem;
            font-weight: 900;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .oasis-post-content {
            font-size: 0.8rem;
            font-weight: 700;
            color: #475569;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .oasis-badge {
            font-size: 0.6rem;
            padding: 3px 8px;
            border-radius: 20px;
            font-weight: 800;
        }

        .oasis-badge.general {
            background: rgba(13, 148, 136, 0.1);
            color: var(--oasis-mint);
        }

        .oasis-badge.sudden {
            background: #fef08a;
            color: #854d0e;
            border: 1px solid rgba(234, 179, 8, 0.3);
            box-shadow: 0 2px 5px rgba(234, 179, 8, 0.1);
            animation: pulse-badge 2s infinite;
        }

        @keyframes pulse-badge {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body style="margin:0; padding:0;">
    <!-- [v44.218] 로딩 오버레이 -->
    <div id="v-loading" class="v-loading-overlay" style="display: flex;">
        <div class="v-loading-spinner"></div>
        <div id="v-loading-msg" style="font-weight: 800; color: var(--oasis-emerald); font-size: 0.9rem;">오아시스 생명샘을 불러오고 있습니다...</div>
    </div>

    <header class="v-global-header" style="background: var(--oasis-emerald);">
        <div style="display:flex; justify-content:space-between; align-items:center; width:100%; max-width:500px; margin:0 auto;">
            <div style="width:40px;"></div>
            <h1 style="color:#fff;">모험가의 오아시스</h1>
            <button class="v-header-logout" id="header-logout-btn" onclick="Auth.logout()" title="마을 퇴장" style="display: flex !important;">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </header>

    <div class="v-profile-bar" style="background: rgba(13, 148, 136, 0.1); border-bottom: 1px solid rgba(13, 148, 136, 0.2);">
        <div class="v-status-badge" id="user-status-badge" style="background: var(--oasis-mint); color:white;">
            <div class="v-status-dot" id="user-status-dot" style="background:#fff;"></div>
            <span id="user-status-name">정보 로딩 중...</span>
        </div>
        <div style="font-size: 0.7rem; color: var(--oasis-emerald); font-weight: 800;" id="user-status-phone">
            NO SESSION
        </div>
    </div>

    <div class="oasis-header-banner">
        <div style="font-size: 2.5rem; margin-bottom: 10px;">🌴</div>
        <h2 style="font-weight: 900; margin: 0 0 8px 0; font-size: 1.3rem; letter-spacing: -0.5px;">사막 속 생명샘, 오아시스</h2>
        <p style="font-weight: 800; font-size: 0.75rem; opacity: 0.85; margin: 0; word-break: keep-all; line-height: 1.4;">
            감량 다짐, 챌린지 성찰, 혹은 나만의 소소한 건강 성취를 자유롭게 텍스트로 남겨 소통해 보세요!
        </p>
    </div>

    <div class="oasis-container">
        
        <!-- ✍️ 글 쓰기 카드 -->
        <div class="oasis-input-card">
            <div style="font-weight: 900; font-size: 0.85rem; color: var(--oasis-emerald); margin-bottom: 15px; display: flex; align-items: center; gap: 6px;">
                <i class="fa-solid fa-pen-nib"></i> 다짐과 성찰 기록하기
            </div>
            
            <input type="text" id="post-title" class="oasis-title-input" placeholder="글 제목 (예: 오늘 나의 다짐 🌟)">
            <textarea id="post-content" class="oasis-textarea" placeholder="이곳에 나만의 생각, 다짐, 성찰을 편안하게 적어보세요..."></textarea>
            
            <!-- ⚡ 돌발 퀘스트 연계 체크박스 -->
            <div class="oasis-checkbox-container" id="sudden-quest-link-box" style="display: none;">
                <input type="checkbox" id="sudden-quest-check">
                <span id="sudden-quest-label">⚡ [오늘의 돌발 퀘스트] 완료를 위해 이 다짐글을 제출합니다! (+15 EXP)</span>
            </div>
            
            <button class="oasis-submit-btn" onclick="submitPost()">
                <i class="fa-solid fa-paper-plane"></i> 다짐샘에 기록하기
            </button>
        </div>

        <!-- 📜 글 목록 컨테이너 -->
        <div style="font-weight: 900; font-size: 0.9rem; color: var(--oasis-emerald); margin-bottom: 15px; display:flex; justify-content:space-between; align-items:center;">
            <span>💬 모험가들의 마음 스레드</span>
            <button onclick="loadPosts()" style="background:transparent; border:none; color:var(--oasis-mint); font-weight:900; font-size:0.75rem; cursor:pointer;">
                <i class="fa-solid fa-rotate"></i> 새로고침
            </button>
        </div>
        
        <div id="oasis-posts-list">
            <!-- Dynamic Post Items injected here -->
        </div>

    </div>

    <!-- 📱 GLOBAL VILLAGE NAV -->
    <nav class="v-nav">
        <a href="index.html" class="v-nav-item">
            <i class="fas fa-home"></i>
            <span>광장</span>
        </a>
        <a href="miracle.html" class="v-nav-item">
            <i class="fas fa-camera"></i>
            <span>아카이브</span>
        </a>
        <a href="oasis.html" class="v-nav-item active">
            <i class="fas fa-water"></i>
            <span>오아시스</span>
        </a>
        <a href="wisdom.html" class="v-nav-item">
            <i class="fas fa-book"></i>
            <span>지식창고</span>
        </a>
        <a href="reservation.html" class="v-nav-item">
            <img src="therapy-icon.png" style="width: 22px; height: 22px; margin-bottom: 2px; border-radius: 4px;">
            <span>테라피(예약)</span>
        </a>
    </nav>

    <script src="bridge.js"></script>
    <script>
        let currentUser = { name: '', phone: '' };
        let activeSuddenQuest = null;

        function renderLoginStatus() {
            const uName = localStorage.getItem('v44_user_name');
            const uPhone = localStorage.getItem('v44_user_phone');
            const badge = document.getElementById('user-status-badge');
            const dot = document.getElementById('user-status-dot');
            const nameEl = document.getElementById('user-status-name');
            const phoneEl = document.getElementById('user-status-phone');
            const logoutBtn = document.getElementById('header-logout-btn');

            if (uName && uPhone) {
                currentUser.name = uName;
                currentUser.phone = uPhone;
                badge.style.background = "var(--oasis-mint)";
                badge.style.color = "white";
                dot.style.background = "#fff";
                nameEl.innerText = `${uName}(${uPhone.slice(-4)}) 님 접속중!`;
                const uTier = localStorage.getItem('v44_user_tier') || "🌱 회원";
                phoneEl.innerText = uTier;
                logoutBtn.style.display = "flex";
            }
        }

        function checkActiveQuest() {
            if (typeof google === 'undefined') return;
            google.script.run
                .withSuccessHandler(res => {
                    if (res && res.success && res.quests && res.quests.todayQuest) {
                        activeSuddenQuest = res.quests.todayQuest;
                        document.getElementById('sudden-quest-link-box').style.display = 'flex';
                        document.getElementById('sudden-quest-label').innerText = `⚡ [오늘의 돌발: ${activeSuddenQuest.title}] 완료를 위해 이 다짐글을 제출합니다! (+15 EXP)`;
                    } else {
                        document.getElementById('sudden-quest-link-box').style.display = 'none';
                    }
                })
                .getUserDashboardData({ phone: currentUser.phone });
        }

        function loadPosts() {
            showLoading("오아시스 생명샘을 정화하고 있습니다...");
            if (typeof google === 'undefined') {
                hideLoading();
                return;
            }
            google.script.run
                .withSuccessHandler(posts => {
                    hideLoading();
                    renderPosts(posts);
                })
                .getOasisPosts();
        }

        function renderPosts(posts) {
            const container = document.getElementById('oasis-posts-list');
            if (!posts || posts.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center; padding:40px; background:#fff; border-radius:20px; border:1px solid rgba(0,0,0,0.05); color:var(--text-dim); font-weight:800; font-size:0.8rem;">
                        🌵 아직 흘러들어온 다짐의 샘물이 없습니다.<br>첫 다짐의 주인공이 되어보세요!
                    </div>
                `;
                return;
            }

            container.innerHTML = posts.map(p => {
                const isSudden = p.category === '돌발';
                return `
                    <div class="oasis-post-card">
                        <div class="oasis-post-header">
                            <span class="oasis-post-author">
                                👤 ${p.author} <span class="oasis-badge ${isSudden ? 'sudden' : 'general'}">${isSudden ? '⚡ 돌발퀘스트' : '일반'}</span>
                            </span>
                            <span class="oasis-post-date">${p.date} ${p.time}</span>
                        </div>
                        <div class="oasis-post-title">${p.title}</div>
                        <div class="oasis-post-content">${p.content}</div>
                    </div>
                `;
            }).join('');
        }

        function submitPost() {
            const title = document.getElementById('post-title').value.trim();
            const content = document.getElementById('post-content').value.trim();
            const isSuddenChecked = document.getElementById('sudden-quest-check').checked;

            if (!title || !content) {
                alert("제목과 내용을 입력해 주세요!");
                return;
            }

            showLoading("다짐의 글을 생명샘에 새기는 중...");

            const payload = {
                phone: currentUser.phone,
                author: currentUser.name,
                title: title,
                content: content,
                category: isSuddenChecked ? '돌발' : '일반',
                questTitle: isSuddenChecked && activeSuddenQuest ? activeSuddenQuest.title : null
            };

            if (typeof google !== 'undefined') {
                google.script.run
                    .withSuccessHandler(res => {
                        hideLoading();
                        if (res.success) {
                            alert(res.message);
                            document.getElementById('post-title').value = '';
                            document.getElementById('post-content').value = '';
                            document.getElementById('sudden-quest-check').checked = false;
                            loadPosts();
                            checkActiveQuest(); // Refresh quest link
                        } else {
                            alert("기록 실패: " + res.error);
                        }
                    })
                    .submitOasisPost(payload);
            } else {
                hideLoading();
                alert("구글 연동 환경이 아닙니다.");
            }
        }

        function showLoading(msg) {
            const overlay = document.getElementById('v-loading');
            const msgEl = document.getElementById('v-loading-msg');
            if (overlay && msgEl) {
                msgEl.innerText = msg;
                overlay.style.display = 'flex';
            }
        }

        function hideLoading() {
            const overlay = document.getElementById('v-loading');
            if (overlay) overlay.style.display = 'none';
        }

        window.onload = function() {
            Auth.check();
            renderLoginStatus();
            setTimeout(() => {
                loadPosts();
                checkActiveQuest();
            }, 300);
        };
    </script>
</body>
</html>
