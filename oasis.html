<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADVENTURER'S OASIS - 노형 빌리지</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .oasis-container { padding: 40px 20px; text-align: center; color: var(--v-wood); }
        .oasis-icon { font-size: 4rem; color: var(--def); margin-bottom: 20px; }
    </style>
</head>
<body style="margin:0; padding:0;">
    <!-- [v44.218] 로딩 오버레이 -->
    <div id="v-loading" class="v-loading-overlay" style="display: flex;">
        <div class="v-loading-spinner"></div>
        <div id="v-loading-msg" style="font-weight: 800; color: var(--v-wood); font-size: 0.9rem;">마을의 소식을 불러오는 중...</div>
    </div>

    <header class="v-global-header">
        <div style="display:flex; justify-content:space-between; align-items:center; width:100%; max-width:500px; margin:0 auto;">
            <div style="width:40px;"></div>
            <h1>모험가의 오아시스</h1>
            <button class="v-header-logout" id="header-logout-btn" onclick="Auth.logout()" title="마을 퇴장" style="display: flex !important;">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </header>

    <div class="v-profile-bar">
        <div class="v-status-badge" id="user-status-badge">
            <div class="v-status-dot" id="user-status-dot"></div>
            <span id="user-status-name">정보 로딩 중...</span>
        </div>
        <div style="font-size: 0.7rem; color: var(--text-dim); font-weight: 700;" id="user-status-phone">
            NO SESSION
        </div>
    </div>
    <div class="oasis-container">
        <div class="oasis-icon">🌵</div>
        <h2 style="font-weight: 900; margin-bottom: 15px;">사막의 시원한 휴식처</h2>
        <p style="font-weight: 700; opacity: 0.8;">현재 커뮤니티 공간을 공사 중입니다.<br>잠시만 기다려 주세요!</p>
    </div>

    <!-- 📱 GLOBAL VILLAGE NAV -->
    <nav class="v-nav">
        <a href="index.html" class="v-nav-item">
            <i class="fas fa-home"></i>
            <span>광장</span>
        </a>
        <a href="miracle.html" class="v-nav-item">
            <i class="fas fa-camera"></i>
            <span>아카이브</span>
        </a>
        <a href="oasis.html" class="v-nav-item active">
            <i class="fas fa-water"></i>
            <span>오아시스</span>
        </a>
        <a href="wisdom.html" class="v-nav-item">
            <i class="fas fa-book"></i>
            <span>지식창고</span>
        </a>
        <a href="reservation.html" class="v-nav-item">
            <img src="therapy-icon.png" style="width: 22px; height: 22px; margin-bottom: 2px; border-radius: 4px;">
            <span>테라피(예약)</span>
        </a>
    </nav>
    <script src="bridge.js"></script>
    <script>
        function renderLoginStatus() {
            const uName = localStorage.getItem('v44_user_name');
            const uPhone = localStorage.getItem('v44_user_phone');
            const badge = document.getElementById('user-status-badge');
            const dot = document.getElementById('user-status-dot');
            const nameEl = document.getElementById('user-status-name');
            const phoneEl = document.getElementById('user-status-phone');
            const logoutBtn = document.getElementById('header-logout-btn');

            if (uName && uPhone) {
                badge.style.background = "var(--emerald)";
                badge.style.color = "white";
                dot.style.background = "#fff";
                nameEl.innerText = `${uName}(${uPhone.slice(-4)}) 님 접속중!`;
                const uTier = localStorage.getItem('v44_user_tier') || "🌱 회원";
                phoneEl.innerText = uTier;
                logoutBtn.style.display = "flex";
            }
        }

        window.onload = function() {
            Auth.check();
            renderLoginStatus();
            setTimeout(hideLoading, 500); // 0.5초 후 로딩 해제 (자연스러운 전환)
        };
    </script>
</body>
</html>
