<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>참여방 - 노형점핑</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6b46c1;
      --bg-dark: #0f172a;
    }

    body {
      font-family: 'Outfit', 'Noto Sans KR', sans-serif;
      background-color: var(--bg-dark);
      color: white;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
    }

    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      text-decoration: none;
      font-size: 0.9rem;
      opacity: 0.7;
    }

    .input-card {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 30px;
    }

    textarea {
      width: 100%;
      background: transparent;
      border: none;
      color: white;
      font-size: 1rem;
      resize: none;
      height: 80px;
      outline: none;
    }

    .submit-btn {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      border: none;
      border-radius: 12px;
      color: white;
      font-weight: 700;
      margin-top: 10px;
    }

    .post-card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 15px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .post-author {
      font-weight: 700;
      font-size: 0.9rem;
      color: #a78bfa;
      margin-bottom: 8px;
    }

    .post-content {
      font-size: 0.95rem;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="?page=index" class="back-btn">← 돌아가기</a>
    <header>
      <h1 style="font-size: 2rem; margin-bottom: 8px;">COMMUNITY</h1>
      <p style="color: #94a3b8;">회원님들의 소소한 이야기</p>
    </header>

    <div class="input-card">
      <textarea placeholder="오늘 운동 소감이나 하고 싶은 말을 남겨주세요!"></textarea>
      <button class="submit-btn">글 남기기</button>
    </div>

    <div id="communityPosts">
      <div class="post-card">
        <div class="post-author">익명회원님</div>
        <div class="post-content">오늘 테라피 받고 나니까 몸이 정말 가벼워졌어요! 원장님 감사합니다 ㅎㅎ</div>
      </div>
      <div class="post-card">
        <div class="post-author">익명회원님</div>
        <div class="post-content">점핑 30분 했는데 땀이 비 오듯 오네요.. 내일도 꼭 올게요!</div>
      </div>
    </div>
  </div>
</body>
</html>
