<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GATEWAY - GENIE WORLD</title>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --v-wood: #5d4037;
      --v-paper: #f9f6f2;
      --v-border: #e0dacc;
      --emerald: #2ecc71;
      --gold: #d4af37;
      --text-main: #2c3e50;
      --text-dim: #7f8c8d;
    }
    
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { 
      font-family: 'Pretendard', sans-serif; background-color: var(--v-paper); 
      color: var(--text-main); margin: 0; padding: 0; 
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
      overflow: hidden;
    }

    .login-container {
      width: 90%; max-width: 400px; background: #fff; border-radius: 40px;
      padding: 40px 30px; box-shadow: 0 20px 50px rgba(93, 64, 55, 0.1);
      border: 1px solid var(--v-border); text-align: center;
      animation: zoomIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .logo-area { font-size: 4rem; margin-bottom: 20px; animation: bounce 2s infinite; }
    
    h1 { font-size: 1.6rem; font-weight: 900; color: var(--v-wood); margin-bottom: 10px; letter-spacing: -1px; }
    p { font-size: 0.9rem; color: var(--text-dim); font-weight: 700; margin-bottom: 30px; line-height: 1.5; }

    .input-group { margin-bottom: 15px; text-align: left; }
    .input-group label { display: block; font-size: 0.75rem; font-weight: 800; color: var(--v-wood); margin-bottom: 8px; margin-left: 5px; }
    input {
      width: 100%; padding: 18px; border: 2px solid var(--v-paper); border-radius: 20px;
      font-size: 1rem; font-weight: 800; outline: none; transition: all 0.3s;
      background: var(--v-paper); color: var(--v-wood);
    }
    input:focus { border-color: var(--gold); background: #fff; box-shadow: 0 0 0 5px rgba(212, 175, 55, 0.1); }

    .start-btn {
      width: 100%; padding: 20px; background: var(--v-wood); color: #fff;
      border: none; border-radius: 20px; font-size: 1.2rem; font-weight: 900;
      cursor: pointer; margin-top: 25px; transition: all 0.3s;
      box-shadow: 0 10px 20px rgba(93, 64, 55, 0.2);
    }
    .start-btn:active { transform: scale(0.95); }

    .v-search-btn {
      background: var(--gold); color: #fff; border: none; border-radius: 15px;
      padding: 0 25px; font-weight: 900; font-size: 1rem; cursor: pointer;
      transition: all 0.2s; white-space: nowrap;
    }
    .v-search-btn:active { transform: scale(0.9); opacity: 0.8; }

    .footer-link { margin-top: 30px; font-size: 0.75rem; color: var(--text-dim); font-weight: 800; }

    @keyframes zoomIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="logo-area">🏰</div>
    <h1>회원 로그인</h1>
    <p>전화번호 뒷 4자리를 입력하고<br>자신의 이름을 선택해 주세요!</p>

    <div class="input-group">
      <label>전화번호 뒷 4자리</label>
      <div style="display:flex; gap:10px;">
        <input type="tel" id="user-phone" placeholder="4자리 숫자" maxlength="4" style="flex:1;">
        <button class="v-search-btn" onclick="startManualSearch()">찾기</button>
      </div>
    </div>

    <div id="member-selection-list" style="margin-top: 20px; display: flex; flex-direction: column; gap: 10px; max-height: 250px; overflow-y: auto; padding-right: 5px;">
      <!-- 매칭된 회원 버튼이 여기에 생성됨 -->
    </div>

    <div class="footer-link">© 2024 Nohyung Village / Antigravity</div>
  </div>

  <script src="bridge.js"></script>
  <script>
    window.onload = function() {
      const savedName = localStorage.getItem('v44_user_name');
      const savedPhone = localStorage.getItem('v44_user_phone');
      if (savedName && savedPhone) {
        // 자동 로그인 방지 (새로 선택하고 싶을 수 있으므로)
        // navigateTo('index', { name: savedName, phone: savedPhone });
      }
    };

    function startManualSearch() {
      const digits = document.getElementById('user-phone').value.trim();
      searchMembers(digits);
    }

    let searchTimeout;
    function searchMembers(digits) {
      const listDiv = document.getElementById('member-selection-list');
      if (digits.length < 2) {
        alert("최소 2자리 이상 입력해주세요.");
        return;
      }

      // 검색 중 상태 표시
      listDiv.innerHTML = `
        <div style="padding:20px; background:var(--v-paper); border-radius:20px; border:1px solid var(--v-border);">
          <p style='font-size:0.85rem; color:var(--text-dim); font-weight:800;'>등록된 회원 명단을 확인합니다...</p>
        </div>
      `;

      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(res => {
            listDiv.innerHTML = "";
            
            if (res && res.success && res.members.length > 0) {
              res.members.forEach(m => {
                const btn = document.createElement('button');
                btn.className = 'start-btn';
                btn.style.marginTop = "0";
                btn.style.background = "#fff";
                btn.style.color = "var(--v-wood)";
                btn.style.border = "2px solid var(--v-wood)";
                btn.innerHTML = `<b>${m.name}</b> 님으로 입장 <i class="fas fa-sign-out-alt" style="font-size:0.8rem; margin-left:5px;"></i>`;
                btn.onclick = () => selectMember(m.name, m.phone);
                listDiv.appendChild(btn);
              });
            } else {
              listDiv.innerHTML = `
                <div style="padding:20px; background:#fff5f5; border-radius:20px; border:1px solid #feb2b2;">
                  <p style='font-size:0.85rem; color:#e74c3c; font-weight:800; margin:0;'>⚠️ 명단에 등록되지 않은 정보입니다.<br><span style="font-size:0.7rem;">번호를 확인해주세요!</span></p>
                </div>
              `;
            }
          })
          .withFailureHandler(err => {
            listDiv.innerHTML = "<p style='color:red;'>서버 통신 오류가 발생했습니다.</p>";
          })
          .searchMembersByDigits({ digits: digits });
      }
    }

    function selectMember(name, phone) {
      localStorage.setItem('v44_user_name', name);
      localStorage.setItem('v44_user_phone', phone);
      
      // [v44.217] 로그인 시점에 즉시 등급(Tier) 정보를 가져와서 저장합니다.
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(res => {
            if (res && res.success) {
              localStorage.setItem('v44_user_tier', res.tier);
            }
            navigateTo('index', { name: name, phone: phone });
          })
          .withFailureHandler(() => {
            navigateTo('index', { name: name, phone: phone });
          })
          .getUserDashboardData({ phone: phone });
      } else {
        navigateTo('index', { name: name, phone: phone });
      }
    }
  </script>
</body>
</html>
